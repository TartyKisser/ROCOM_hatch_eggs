<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>精灵图鉴 - 洛克王国世界工具站</title>
    <style>
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --secondary: #ec4899;
            --text: #1e293b;
            --text-secondary: #64748b;
            --border: rgba(226,232,240,0.9);
            --panel: rgba(255,255,255,0.92);
            --panel-soft: rgba(248,250,252,0.86);
            --shadow: 0 18px 45px rgba(15, 23, 42, 0.18);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            padding: 20px;
            font-family: 'Segoe UI', system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
            color: var(--text);
            background: url('./bg.jpg') no-repeat center center fixed,
                        linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            background-size: cover;
        }

        .container {
            width: 96%;
            max-width: 1500px;
            margin: 0 auto;
        }

        header {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            padding: 42px 20px 28px;
            color: white;
        }

        .hero-eyebrow {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 6px 12px;
            margin-bottom: 16px;
            border: 1px solid rgba(255,255,255,0.32);
            border-radius: 999px;
            background: rgba(15,23,42,0.22);
            color: rgba(255,255,255,0.9);
            font-size: 0.78rem;
            font-weight: 800;
            letter-spacing: 0.08em;
        }

        .main-title {
            font-size: 2.6rem;
            line-height: 1.12;
            margin-bottom: 10px;
            font-weight: 900;
            text-shadow: 0 4px 18px rgba(15,23,42,0.45);
        }

        .desc-font {
            font-size: 1.05rem;
            color: rgba(255,255,255,0.94);
            text-shadow: 0 2px 8px rgba(15,23,42,0.28);
        }

        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 16px;
            margin-bottom: 18px;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            min-height: 42px;
            padding: 10px 16px;
            border: 1px solid rgba(255,255,255,0.48);
            border-radius: 12px;
            background: rgba(255,255,255,0.9);
            color: var(--primary-dark);
            font-size: 0.95rem;
            font-weight: 800;
            text-decoration: none;
            cursor: pointer;
            box-shadow: 0 8px 22px rgba(15,23,42,0.12);
            transition: transform 0.2s ease, border-color 0.2s ease;
        }

        .btn:hover {
            transform: translateY(-2px);
            border-color: rgba(99,102,241,0.48);
        }

        .count-pill {
            display: inline-flex;
            align-items: center;
            min-height: 36px;
            padding: 8px 12px;
            border-radius: 999px;
            background: rgba(255,255,255,0.84);
            color: var(--text-secondary);
            font-size: 0.9rem;
            font-weight: 700;
        }

        .handbook-layout {
            display: grid;
            grid-template-columns: minmax(300px, 390px) minmax(0, 1fr);
            gap: 18px;
            align-items: start;
        }

        .panel {
            background: var(--panel);
            border: 1px solid rgba(255,255,255,0.55);
            border-radius: 18px;
            box-shadow: var(--shadow);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }

        .sidebar {
            position: sticky;
            top: 18px;
            overflow: hidden;
        }

        .search-area {
            padding: 18px;
            border-bottom: 1px solid var(--border);
        }

        .search-input {
            width: 100%;
            padding: 13px 15px;
            border: 2px solid var(--border);
            border-radius: 13px;
            font-size: 1rem;
            color: var(--text);
            background: rgba(255,255,255,0.94);
            outline: none;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
        }

        .search-input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(99,102,241,0.12);
        }

        .filters {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 12px;
        }

        .filter-chip,
        .type-chip {
            display: inline-flex;
            align-items: center;
            min-height: 28px;
            padding: 5px 9px;
            border: 1px solid rgba(99,102,241,0.16);
            border-radius: 999px;
            background: rgba(99,102,241,0.08);
            color: var(--primary-dark);
            font-size: 0.82rem;
            font-weight: 800;
            cursor: pointer;
        }

        .filter-chip.active {
            color: white;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-color: transparent;
        }

        .list {
            max-height: 70vh;
            overflow-y: auto;
            padding: 10px;
        }

        .list-item {
            width: 100%;
            min-height: 76px;
            border: 1px solid transparent;
            border-radius: 14px;
            padding: 10px;
            background: transparent;
            display: grid;
            grid-template-columns: 56px minmax(0, 1fr);
            gap: 11px;
            align-items: center;
            cursor: pointer;
            text-align: left;
            transition: background 0.16s ease, border-color 0.16s ease;
        }

        .list-item:hover,
        .list-item.active {
            background: rgba(99,102,241,0.08);
            border-color: rgba(99,102,241,0.18);
        }

        .list-thumb {
            width: 56px;
            height: 56px;
            object-fit: contain;
            border-radius: 14px;
            background: rgba(255,255,255,0.86);
        }

        .list-title {
            font-size: 0.98rem;
            font-weight: 900;
            color: var(--text);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .list-meta {
            margin-top: 4px;
            display: flex;
            align-items: center;
            gap: 7px;
            color: var(--text-secondary);
            font-size: 0.82rem;
        }

        .empty-state {
            padding: 26px 16px;
            text-align: center;
            color: var(--text-secondary);
            font-weight: 700;
        }

        .detail {
            overflow: hidden;
        }

        .detail-hero {
            min-height: 330px;
            padding: 26px;
            display: grid;
            grid-template-columns: minmax(230px, 360px) minmax(0, 1fr);
            gap: 26px;
            align-items: center;
            color: white;
            background:
                linear-gradient(135deg, rgba(79,70,229,0.94), rgba(14,165,233,0.74)),
                radial-gradient(circle at top right, rgba(236,72,153,0.48), transparent 42%);
        }

        .portrait-wrap {
            min-height: 280px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 18px;
            background:
                radial-gradient(circle at 50% 45%, rgba(255,255,255,0.72), rgba(255,255,255,0.18) 46%, rgba(255,255,255,0.06) 70%);
        }

        .portrait {
            width: min(300px, 92%);
            aspect-ratio: 1;
            object-fit: contain;
            filter: drop-shadow(0 18px 24px rgba(15,23,42,0.28));
        }

        .detail-number {
            display: inline-flex;
            padding: 6px 11px;
            border-radius: 999px;
            background: rgba(255,255,255,0.18);
            font-size: 0.92rem;
            font-weight: 900;
            margin-bottom: 12px;
        }

        .detail-title {
            font-size: clamp(2rem, 4vw, 3.3rem);
            line-height: 1.08;
            margin-bottom: 12px;
            font-weight: 900;
            text-shadow: 0 4px 18px rgba(15,23,42,0.28);
        }

        .type-row {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 16px;
        }

        .detail-hero .type-chip {
            color: white;
            background: rgba(255,255,255,0.2);
            border-color: rgba(255,255,255,0.24);
            cursor: default;
        }

        .hero-copy {
            line-height: 1.8;
            color: rgba(255,255,255,0.92);
            max-width: 680px;
            white-space: pre-line;
        }

        .detail-body {
            padding: 22px;
            display: grid;
            gap: 18px;
        }

        .info-grid {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 12px;
        }

        .info-tile,
        .section {
            border: 1px solid var(--border);
            border-radius: 16px;
            background: var(--panel-soft);
        }

        .info-tile {
            padding: 14px;
        }

        .info-label {
            color: var(--text-secondary);
            font-size: 0.82rem;
            font-weight: 800;
            margin-bottom: 6px;
        }

        .info-value {
            font-size: 1rem;
            font-weight: 900;
        }

        .section {
            padding: 18px;
        }

        .section-title {
            font-size: 1.12rem;
            color: var(--primary-dark);
            margin-bottom: 14px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .section-title::before {
            content: '';
            width: 4px;
            height: 22px;
            background: var(--primary);
            border-radius: 2px;
        }

        .stats-grid {
            display: grid;
            gap: 10px;
        }

        .stat-row {
            display: grid;
            grid-template-columns: 70px 1fr 46px;
            gap: 12px;
            align-items: center;
        }

        .stat-name {
            color: var(--text-secondary);
            font-size: 0.9rem;
            font-weight: 800;
        }

        .stat-bar {
            height: 10px;
            border-radius: 999px;
            background: rgba(226,232,240,0.95);
            overflow: hidden;
        }

        .stat-fill {
            height: 100%;
            border-radius: inherit;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
        }

        .stat-value {
            text-align: right;
            font-weight: 900;
        }

        .ability-list {
            display: grid;
            gap: 10px;
        }

        .ability {
            padding: 12px;
            border-radius: 12px;
            background: rgba(255,255,255,0.72);
            border: 1px solid rgba(226,232,240,0.86);
        }

        .ability-name {
            font-weight: 900;
            color: var(--primary-dark);
            margin-bottom: 5px;
        }

        .ability-desc,
        .skill-desc {
            color: var(--text-secondary);
            line-height: 1.65;
        }

        .skill-table-wrap {
            max-height: 520px;
            overflow: auto;
            border: 1px solid var(--border);
            border-radius: 14px;
            background: rgba(255,255,255,0.72);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 720px;
        }

        th,
        td {
            padding: 11px 12px;
            border-bottom: 1px solid rgba(226,232,240,0.86);
            text-align: left;
            vertical-align: top;
            font-size: 0.92rem;
        }

        th {
            position: sticky;
            top: 0;
            z-index: 1;
            background: rgba(248,250,252,0.98);
            color: var(--text-secondary);
            font-weight: 900;
        }

        tr:last-child td {
            border-bottom: 0;
        }

        .source-link {
            color: var(--primary-dark);
            font-weight: 900;
            text-decoration: none;
        }

        .source-link:hover {
            text-decoration: underline;
        }

        .footer-beian {
            text-align: center;
            margin-top: 40px;
            padding-bottom: 20px;
            font-size: 13px;
        }

        .footer-beian a {
            color: rgba(255,255,255,0.8);
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 5px;
            transition: color 0.3s;
        }

        .footer-beian a:hover {
            color: #ffffff;
        }

        @media (max-width: 980px) {
            .handbook-layout {
                grid-template-columns: 1fr;
            }

            .sidebar {
                position: static;
            }

            .list {
                max-height: 420px;
            }

            .detail-hero {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 768px) {
            body {
                padding: 16px;
            }

            .main-title {
                font-size: 1.9rem;
            }

            .topbar {
                align-items: stretch;
                flex-direction: column;
            }

            .info-grid {
                grid-template-columns: 1fr;
            }

            .detail-hero {
                min-height: auto;
                padding: 20px;
            }

            .portrait-wrap {
                min-height: 220px;
            }

            .stat-row {
                grid-template-columns: 58px 1fr 38px;
                gap: 8px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="hero-eyebrow">HANDBOOK</div>
            <h1 class="main-title">精灵图鉴</h1>
            <p class="desc-font">检索精灵资料、属性、种族值、特性与技能。</p>
        </header>

        <div class="topbar">
            <a class="btn" href="index.html">‹ 返回主页</a>
            <div class="count-pill" id="resultCount">数据加载中</div>
        </div>

        <main class="handbook-layout">
            <aside class="panel sidebar">
                <div class="search-area">
                    <input id="searchInput" class="search-input" type="search" placeholder="搜索编号、名称、属性或分布..." autocomplete="off">
                    <div id="filters" class="filters"></div>
                </div>
                <div id="spriteList" class="list">
                    <div class="empty-state">正在加载图鉴数据...</div>
                </div>
            </aside>

            <section id="detailPanel" class="panel detail">
                <div class="empty-state">请选择一个精灵查看详情。</div>
            </section>
        </main>
    </div>

    <div class="footer-beian">
        <a href="https://beian.mps.gov.cn/#/query/webSearch?code=32058102002843" rel="noreferrer" target="_blank">
            <img src="https://img.alicdn.com/tfs/TB1..50QpXXXXX7XpXXXXXXXXXX-40-40.png" alt="" style="width: 20px; height: 20px;">
            苏公网安备32058102002843号
        </a>
    </div>

    <script>
        const STAT_LABELS = ['生命', '物攻', '魔攻', '物防', '魔防', '速度'];
        const STAT_MAX = 180;
        const ATTRIBUTES = ['普通', '草', '火', '水', '光', '地', '冰', '龙', '电', '毒', '虫', '武', '翼', '萌', '幽', '恶', '机械', '幻'];

        let records = [];
        let filteredRecords = [];
        let selectedId = '';
        let activeAttribute = '';

        const searchInput = document.getElementById('searchInput');
        const filters = document.getElementById('filters');
        const spriteList = document.getElementById('spriteList');
        const detailPanel = document.getElementById('detailPanel');
        const resultCount = document.getElementById('resultCount');

        function escapeHtml(value) {
            return String(value ?? '').replace(/[&<>"']/g, char => ({
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#39;'
            }[char]));
        }

        function normalize(value) {
            return String(value || '').replace(/\s+/g, '').toLowerCase();
        }

        function statValue(record, key) {
            const value = record.stats && record.stats[key];
            return value === undefined || value === null || value === '' ? '-' : value;
        }

        function renderFilters() {
            filters.innerHTML = [
                `<button class="filter-chip ${activeAttribute === '' ? 'active' : ''}" type="button" data-attr="">全部</button>`,
                ...ATTRIBUTES.map(attr => (
                    `<button class="filter-chip ${activeAttribute === attr ? 'active' : ''}" type="button" data-attr="${escapeHtml(attr)}">${escapeHtml(attr)}</button>`
                ))
            ].join('');

            filters.querySelectorAll('.filter-chip').forEach(button => {
                button.addEventListener('click', () => {
                    activeAttribute = button.dataset.attr || '';
                    applyFilters();
                });
            });
        }

        function applyFilters() {
            const keyword = normalize(searchInput.value);
            filteredRecords = records.filter(record => {
                const matchesKeyword = !keyword || record.searchText.includes(keyword);
                const matchesAttribute = !activeAttribute || record.attributes.includes(activeAttribute);
                return matchesKeyword && matchesAttribute;
            });

            if (!filteredRecords.some(record => record.id === selectedId)) {
                selectedId = filteredRecords[0]?.id || '';
            }

            renderFilters();
            renderList();
            renderDetail();
        }

        function renderList() {
            resultCount.textContent = `共 ${filteredRecords.length} / ${records.length} 条`;
            if (filteredRecords.length === 0) {
                spriteList.innerHTML = '<div class="empty-state">没有匹配的精灵。</div>';
                return;
            }

            spriteList.innerHTML = filteredRecords.map(record => `
                <button class="list-item ${record.id === selectedId ? 'active' : ''}" type="button" data-id="${escapeHtml(record.id)}">
                    <img class="list-thumb" src="${escapeHtml(record.icon || record.portrait)}" alt="${escapeHtml(record.title)}" loading="lazy" onerror="this.style.display='none'">
                    <div>
                        <div class="list-title">${escapeHtml(record.title)}</div>
                        <div class="list-meta">
                            <span>No.${escapeHtml(record.number)}</span>
                            <span>${escapeHtml(record.attributes.join(' / ') || '无属性')}</span>
                        </div>
                    </div>
                </button>
            `).join('');

            spriteList.querySelectorAll('.list-item').forEach(item => {
                item.addEventListener('click', () => {
                    selectedId = item.dataset.id;
                    location.hash = encodeURIComponent(selectedId);
                    renderList();
                    renderDetail();
                });
            });
        }

        function renderDetail() {
            const record = records.find(item => item.id === selectedId);
            if (!record) {
                detailPanel.innerHTML = '<div class="empty-state">请选择一个精灵查看详情。</div>';
                return;
            }

            const total = statValue(record, '种族值');
            const abilities = record.abilities && record.abilities.length
                ? record.abilities.map(ability => `
                    <div class="ability">
                        <div class="ability-name">${escapeHtml(ability.name)}</div>
                        <div class="ability-desc">${escapeHtml(ability.description || '暂无描述')}</div>
                    </div>
                `).join('')
                : '<div class="empty-state">暂无特性资料。</div>';

            const skills = record.skills && record.skills.length
                ? record.skills.map(skill => `
                    <tr>
                        <td>${escapeHtml(skill.level)}</td>
                        <td><strong>${escapeHtml(skill.name)}</strong></td>
                        <td>${escapeHtml(skill.cost || '-')}</td>
                        <td>${escapeHtml(skill.category || '-')}</td>
                        <td>${escapeHtml(skill.power || '-')}</td>
                        <td class="skill-desc">${escapeHtml(skill.description || '-')}</td>
                    </tr>
                `).join('')
                : '<tr><td colspan="6">暂无技能资料。</td></tr>';

            detailPanel.innerHTML = `
                <div class="detail-hero">
                    <div class="portrait-wrap">
                        <img class="portrait" src="${escapeHtml(record.portrait || record.icon)}" alt="${escapeHtml(record.title)}" onerror="this.style.display='none'">
                    </div>
                    <div>
                        <div class="detail-number">No.${escapeHtml(record.number)}</div>
                        <h2 class="detail-title">${escapeHtml(record.title)}</h2>
                        <div class="type-row">
                            ${(record.attributes.length ? record.attributes : ['无属性']).map(attr => `<span class="type-chip">${escapeHtml(attr)}</span>`).join('')}
                        </div>
                        <p class="hero-copy">${escapeHtml(record.description || '暂无简介。')}</p>
                    </div>
                </div>

                <div class="detail-body">
                    <div class="info-grid">
                        <div class="info-tile">
                            <div class="info-label">种族值</div>
                            <div class="info-value">${escapeHtml(total)}</div>
                        </div>
                        <div class="info-tile">
                            <div class="info-label">身高</div>
                            <div class="info-value">${escapeHtml(record.height || '-')}</div>
                        </div>
                        <div class="info-tile">
                            <div class="info-label">体重</div>
                            <div class="info-value">${escapeHtml(record.weight || '-')}</div>
                        </div>
                    </div>

                    <div class="section">
                        <h3 class="section-title">分布</h3>
                        <p class="ability-desc">${escapeHtml(record.distribution || '暂无分布资料。')}</p>
                    </div>

                    <div class="section">
                        <h3 class="section-title">能力值</h3>
                        <div class="stats-grid">
                            ${STAT_LABELS.map(label => {
                                const value = Number(record.stats[label] || 0);
                                const width = Math.max(3, Math.min(100, Math.round(value / STAT_MAX * 100)));
                                return `
                                    <div class="stat-row">
                                        <div class="stat-name">${label}</div>
                                        <div class="stat-bar"><div class="stat-fill" style="width:${width}%"></div></div>
                                        <div class="stat-value">${escapeHtml(record.stats[label] || '-')}</div>
                                    </div>
                                `;
                            }).join('')}
                        </div>
                    </div>

                    <div class="section">
                        <h3 class="section-title">特性</h3>
                        <div class="ability-list">${abilities}</div>
                    </div>

                    <div class="section">
                        <h3 class="section-title">技能</h3>
                        <div class="skill-table-wrap">
                            <table>
                                <thead>
                                    <tr>
                                        <th>等级</th>
                                        <th>技能</th>
                                        <th>能量</th>
                                        <th>类别</th>
                                        <th>威力</th>
                                        <th>描述</th>
                                    </tr>
                                </thead>
                                <tbody>${skills}</tbody>
                            </table>
                        </div>
                    </div>

                    <div class="section">
                        <h3 class="section-title">来源</h3>
                        <a class="source-link" href="${escapeHtml(record.url)}" target="_blank" rel="noreferrer">洛克王国世界 WIKI 原页面</a>
                    </div>
                </div>
            `;
        }

        async function loadHandbook() {
            try {
                const response = await fetch('handbook_data.json');
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                const data = await response.json();
                records = data.records || [];
                filteredRecords = records;

                const hashId = decodeURIComponent(location.hash.replace(/^#/, ''));
                selectedId = records.some(record => record.id === hashId) ? hashId : records[0]?.id || '';
                renderFilters();
                renderList();
                renderDetail();
            } catch (error) {
                console.error(error);
                resultCount.textContent = '加载失败';
                spriteList.innerHTML = '<div class="empty-state">图鉴数据加载失败。</div>';
                detailPanel.innerHTML = '<div class="empty-state">请确认 handbook_data.json 存在并可访问。</div>';
            }
        }

        searchInput.addEventListener('input', applyFilters);
        loadHandbook();
    </script>
</body>
</html>
