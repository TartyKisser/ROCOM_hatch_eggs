<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>精灵图鉴 - 洛克王国世界工具站</title>
    <style>
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --secondary: #ec4899;
            --text: #1e293b;
            --text-secondary: #64748b;
            --border: rgba(226,232,240,0.9);
            --panel: rgba(255,255,255,0.92);
            --panel-soft: rgba(248,250,252,0.86);
            --shadow: 0 18px 45px rgba(15, 23, 42, 0.18);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            padding: 20px;
            font-family: 'Segoe UI', system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
            color: var(--text);
            background: url('./web_images/bg.jpg') no-repeat center center fixed,
                        linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            background-size: cover;
        }

        .container {
            width: 96%;
            max-width: 1500px;
            margin: 0 auto;
        }

        header {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            padding: 42px 20px 28px;
            color: white;
        }

        .hero-eyebrow {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 6px 12px;
            margin-bottom: 16px;
            border: 1px solid rgba(255,255,255,0.32);
            border-radius: 999px;
            background: rgba(15,23,42,0.22);
            color: rgba(255,255,255,0.9);
            font-size: 0.78rem;
            font-weight: 800;
            letter-spacing: 0.08em;
        }

        .main-title {
            font-size: 2.6rem;
            line-height: 1.12;
            margin-bottom: 10px;
            font-weight: 900;
            text-shadow: 0 4px 18px rgba(15,23,42,0.45);
        }

        .desc-font {
            font-size: 1.05rem;
            color: rgba(255,255,255,0.94);
            text-shadow: 0 2px 8px rgba(15,23,42,0.28);
        }

        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 16px;
            margin-bottom: 18px;
        }

        .topbar-actions {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            min-height: 42px;
            padding: 10px 16px;
            border: 1px solid rgba(255,255,255,0.48);
            border-radius: 12px;
            background: rgba(255,255,255,0.9);
            color: var(--primary-dark);
            font-size: 0.95rem;
            font-weight: 800;
            text-decoration: none;
            cursor: pointer;
            box-shadow: 0 8px 22px rgba(15,23,42,0.12);
            transition: transform 0.2s ease, border-color 0.2s ease;
        }

        .btn:hover {
            transform: translateY(-2px);
            border-color: rgba(99,102,241,0.48);
        }

        .count-pill {
            display: inline-flex;
            align-items: center;
            min-height: 36px;
            padding: 8px 12px;
            border-radius: 999px;
            background: rgba(255,255,255,0.84);
            color: var(--text-secondary);
            font-size: 0.9rem;
            font-weight: 700;
        }

        .panel {
            background: var(--panel);
            border: 1px solid rgba(255,255,255,0.55);
            border-radius: 18px;
            box-shadow: var(--shadow);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }

        .controls {
            padding: 18px;
            margin-bottom: 18px;
        }

        .search-row {
            display: grid;
            grid-template-columns: minmax(0, 1fr) auto;
            gap: 12px;
            align-items: center;
        }

        .search-input {
            width: 100%;
            min-height: 46px;
            padding: 13px 15px;
            border: 2px solid var(--border);
            border-radius: 13px;
            font-size: 1rem;
            color: var(--text);
            background: rgba(255,255,255,0.94);
            outline: none;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
        }

        .search-input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(99,102,241,0.12);
        }

        .filters {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 12px;
        }

        .filter-block + .filter-block {
            margin-top: 10px;
        }

        .filter-label {
            margin-top: 12px;
            color: var(--text-secondary);
            font-size: 0.82rem;
            font-weight: 900;
        }

        .filter-chip,
        .type-chip {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            min-height: 28px;
            padding: 5px 9px;
            border: 1px solid rgba(99,102,241,0.16);
            border-radius: 999px;
            background: rgba(99,102,241,0.08);
            color: var(--primary-dark);
            font-size: 0.82rem;
            font-weight: 800;
            cursor: pointer;
        }

        .type-logo {
            width: 18px;
            height: 18px;
            object-fit: contain;
            flex: 0 0 auto;
        }

        .filter-chip.active {
            color: white;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-color: transparent;
        }

        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(158px, 1fr));
            gap: 14px;
        }

        .sprite-card {
            min-height: 218px;
            border: 1px solid rgba(255,255,255,0.55);
            border-radius: 18px;
            padding: 14px;
            background: var(--sprite-bg,
                linear-gradient(180deg, rgba(255,255,255,0.95), rgba(255,255,255,0.84)),
                radial-gradient(circle at top right, rgba(99,102,241,0.16), transparent 42%));
            box-shadow: 0 14px 34px rgba(15,23,42,0.14);
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            cursor: pointer;
            transition: transform 0.18s ease, box-shadow 0.18s ease, border-color 0.18s ease;
        }

        .sprite-card:hover {
            transform: translateY(-5px);
            border-color: rgba(99,102,241,0.42);
            box-shadow: 0 20px 44px rgba(15,23,42,0.22);
        }

        .card-image-wrap {
            width: 116px;
            height: 116px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 22px;
            background:
                radial-gradient(circle, rgba(255,255,255,0.95), rgba(238,242,255,0.72));
        }

        .card-image {
            width: 108px;
            height: 108px;
            object-fit: contain;
            filter: drop-shadow(0 10px 12px rgba(15,23,42,0.16));
        }

        .card-number {
            color: var(--primary-dark);
            font-size: 0.82rem;
            font-weight: 900;
            margin-bottom: 4px;
        }

        .card-title {
            width: 100%;
            color: var(--text);
            font-size: 1rem;
            font-weight: 900;
            line-height: 1.35;
            min-height: 2.7em;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .card-types {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 5px;
            margin-top: 10px;
        }

        .empty-state {
            padding: 34px 16px;
            text-align: center;
            color: var(--text-secondary);
            font-weight: 700;
        }

        .view {
            display: none;
        }

        .view.active {
            display: block;
        }

        .detail {
            overflow: hidden;
        }

        .detail-hero {
            min-height: 330px;
            padding: 26px;
            display: grid;
            grid-template-columns: minmax(230px, 360px) minmax(0, 1fr);
            gap: 26px;
            align-items: center;
            color: white;
            background: var(--sprite-bg,
                linear-gradient(135deg, rgba(79,70,229,0.94), rgba(14,165,233,0.74)),
                radial-gradient(circle at top right, rgba(236,72,153,0.48), transparent 42%));
        }

        .portrait-wrap {
            min-height: 280px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 18px;
            background:
                radial-gradient(circle at 50% 45%, rgba(255,255,255,0.72), rgba(255,255,255,0.18) 46%, rgba(255,255,255,0.06) 70%);
        }

        .portrait {
            width: min(300px, 92%);
            aspect-ratio: 1;
            object-fit: contain;
            filter: drop-shadow(0 18px 24px rgba(15,23,42,0.28));
        }

        .detail-number {
            display: inline-flex;
            padding: 6px 11px;
            border-radius: 999px;
            background: rgba(255,255,255,0.18);
            font-size: 0.92rem;
            font-weight: 900;
            margin-bottom: 12px;
        }

        .detail-title {
            font-size: clamp(2rem, 4vw, 3.3rem);
            line-height: 1.08;
            margin-bottom: 12px;
            font-weight: 900;
            text-shadow: 0 4px 18px rgba(15,23,42,0.28);
        }

        .type-row {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 16px;
        }

        .detail-hero .type-chip {
            color: white;
            background: rgba(255,255,255,0.2);
            border-color: rgba(255,255,255,0.24);
            cursor: default;
        }

        .detail-hero .egg-chip {
            background: rgba(236,72,153,0.24);
        }

        .hero-copy {
            line-height: 1.8;
            color: rgba(255,255,255,0.92);
            max-width: 680px;
            white-space: pre-line;
        }

        .detail-body {
            padding: 22px;
            display: grid;
            gap: 18px;
        }

        .info-grid {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 12px;
        }

        .info-tile,
        .section {
            border: 1px solid var(--border);
            border-radius: 16px;
            background: var(--panel-soft);
        }

        .info-tile {
            padding: 14px;
        }

        .info-label {
            color: var(--text-secondary);
            font-size: 0.82rem;
            font-weight: 800;
            margin-bottom: 6px;
        }

        .info-value {
            font-size: 1rem;
            font-weight: 900;
        }

        .section {
            padding: 18px;
        }

        .section-title {
            font-size: 1.12rem;
            color: var(--primary-dark);
            margin-bottom: 14px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .section-title::before {
            content: '';
            width: 4px;
            height: 22px;
            background: var(--primary);
            border-radius: 2px;
        }

        .fruit-card {
            display: grid;
            grid-template-columns: 118px minmax(0, 1fr);
            gap: 16px;
            align-items: center;
        }

        .fruit-image-wrap {
            width: 118px;
            height: 118px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255,255,255,0.78);
            border: 1px solid rgba(226,232,240,0.92);
        }

        .fruit-image {
            width: 100px;
            height: 100px;
            object-fit: contain;
            filter: drop-shadow(0 8px 12px rgba(15,23,42,0.12));
        }

        .stats-grid {
            display: grid;
            gap: 10px;
        }

        .stat-row {
            display: grid;
            grid-template-columns: 70px 1fr 46px;
            gap: 12px;
            align-items: center;
        }

        .stat-name {
            color: var(--text-secondary);
            font-size: 0.9rem;
            font-weight: 800;
        }

        .stat-bar {
            height: 10px;
            border-radius: 999px;
            background: rgba(226,232,240,0.95);
            overflow: hidden;
        }

        .stat-fill {
            height: 100%;
            border-radius: inherit;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
        }

        .stat-value {
            text-align: right;
            font-weight: 900;
        }

        .ability-list {
            display: grid;
            gap: 10px;
        }

        .ability {
            padding: 12px;
            border-radius: 12px;
            background: rgba(255,255,255,0.72);
            border: 1px solid rgba(226,232,240,0.86);
        }

        .ability-name {
            font-weight: 900;
            color: var(--primary-dark);
            margin-bottom: 5px;
        }

        .ability-desc,
        .skill-desc {
            color: var(--text-secondary);
            line-height: 1.65;
        }

        .skill-table-wrap {
            border: 1px solid var(--border);
            border-radius: 14px;
            background: rgba(255,255,255,0.72);
            overflow: hidden;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th,
        td {
            padding: 11px 12px;
            border-bottom: 1px solid rgba(226,232,240,0.86);
            text-align: left;
            vertical-align: top;
            font-size: 0.92rem;
        }

        th {
            background: rgba(248,250,252,0.98);
            color: var(--text-secondary);
            font-weight: 900;
        }

        tr:last-child td {
            border-bottom: 0;
        }

        .source-link {
            color: var(--primary-dark);
            font-weight: 900;
            text-decoration: none;
        }

        .source-link:hover {
            text-decoration: underline;
        }

        .footer-beian {
            text-align: center;
            margin-top: 40px;
            padding-bottom: 20px;
            font-size: 13px;
        }

        .footer-beian a {
            color: rgba(255,255,255,0.8);
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 5px;
            transition: color 0.3s;
        }

        .footer-beian a:hover {
            color: #ffffff;
        }

        @media (max-width: 980px) {
            .detail-hero {
                grid-template-columns: 1fr;
            }

            .card-grid {
                grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            }
        }

        @media (max-width: 768px) {
            body {
                padding: 16px;
            }

            .main-title {
                font-size: 1.9rem;
            }

            .topbar {
                align-items: stretch;
                flex-direction: column;
            }

            .search-row {
                grid-template-columns: 1fr;
            }

            .info-grid {
                grid-template-columns: 1fr;
            }

            .detail-hero {
                min-height: auto;
                padding: 20px;
            }

            .portrait-wrap {
                min-height: 220px;
            }

            .stat-row {
                grid-template-columns: 58px 1fr 38px;
                gap: 8px;
            }

            .fruit-card {
                grid-template-columns: 1fr;
                justify-items: start;
            }

            table,
            thead,
            tbody,
            tr,
            th,
            td {
                display: block;
            }

            thead {
                display: none;
            }

            tr {
                padding: 12px;
                border-bottom: 1px solid rgba(226,232,240,0.86);
            }

            tr:last-child {
                border-bottom: 0;
            }

            td {
                padding: 4px 0;
                border-bottom: 0;
            }

            td::before {
                content: attr(data-label);
                display: inline-block;
                min-width: 46px;
                margin-right: 8px;
                color: var(--text-secondary);
                font-weight: 900;
            }
        }

        @media (max-width: 480px) {
            .card-grid {
                grid-template-columns: repeat(2, minmax(0, 1fr));
                gap: 10px;
            }

            .sprite-card {
                min-height: 190px;
                padding: 10px;
            }

            .card-image-wrap {
                width: 96px;
                height: 96px;
            }

            .card-image {
                width: 90px;
                height: 90px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="hero-eyebrow">HANDBOOK</div>
            <h1 class="main-title">精灵图鉴</h1>
            <p class="desc-font">浏览精灵卡片，点击进入详情。</p>
        </header>

        <div class="topbar">
            <a id="homeLink" class="btn" href="index.html">‹ 返回主页</a>
            <button id="backToGallery" class="btn" type="button" style="display:none;">‹ 返回图鉴</button>
            <div class="topbar-actions">
                <div class="count-pill" id="resultCount">数据加载中</div>
            </div>
        </div>

        <main id="galleryView" class="view active">
            <section class="panel controls">
                <div class="search-row">
                    <input id="searchInput" class="search-input" type="search" placeholder="搜索编号、名称、属性、蛋组或分布..." autocomplete="off">
                    <button id="clearSearch" class="btn" type="button">清空</button>
                </div>
                <div class="filter-block">
                    <div class="filter-label">系别</div>
                    <div id="filters" class="filters"></div>
                </div>
                <div class="filter-block">
                    <div class="filter-label">蛋组</div>
                    <div id="eggFilters" class="filters"></div>
                </div>
            </section>

            <section id="cardGrid" class="card-grid">
                <div class="empty-state">正在加载图鉴数据...</div>
            </section>
        </main>

        <main id="detailView" class="view">
            <section id="detailPanel" class="panel detail">
                <div class="empty-state">请选择一个精灵查看详情。</div>
            </section>
        </main>
    </div>

    <div class="footer-beian">
        <a href="https://beian.mps.gov.cn/#/query/webSearch?code=32058102002843" rel="noreferrer" target="_blank">
            <img src="https://img.alicdn.com/tfs/TB1..50QpXXXXX7XpXXXXXXXXXX-40-40.png" alt="" style="width: 20px; height: 20px;">
            苏公网安备32058102002843号
        </a>
    </div>

    <script>
        const STAT_LABELS = ['生命', '物攻', '魔攻', '物防', '魔防', '速度'];
        const STAT_MAX = 180;
        const ATTRIBUTES = ['普通', '草', '火', '水', '光', '地', '冰', '龙', '电', '毒', '虫', '武', '翼', '萌', '幽', '恶', '机械', '幻'];
        const ATTRIBUTE_LOGOS = Object.fromEntries(
            ATTRIBUTES.map(attr => [attr, `./web_images/types/${attr}.png`])
        );
        const ATTRIBUTE_COLORS = {
            '普通': '#3F89B4',
            '草': '#4EBC73',
            '火': '#DB5525',
            '水': '#6AA9FE',
            '光': '#4FC0FF',
            '地': '#9A7E3F',
            '冰': '#5FADDD',
            '龙': '#ED4962',
            '电': '#E7C506',
            '毒': '#BA62E0',
            '虫': '#9ECE21',
            '武': '#FF9636',
            '翼': '#3EC7CA',
            '萌': '#FC7CAC',
            '幽': '#9446EC',
            '恶': '#CF467A',
            '机械': '#40CBA9',
            '幻': '#9FA7F8'
        };
        const FALLBACK_ATTRIBUTE_COLOR = '#6366f1';

        let records = [];
        let filteredRecords = [];
        let eggGroups = [];
        let selectedId = '';
        let activeAttribute = '';
        let activeEggGroup = '';

        const searchInput = document.getElementById('searchInput');
        const clearSearch = document.getElementById('clearSearch');
        const filters = document.getElementById('filters');
        const eggFilters = document.getElementById('eggFilters');
        const cardGrid = document.getElementById('cardGrid');
        const detailPanel = document.getElementById('detailPanel');
        const resultCount = document.getElementById('resultCount');
        const galleryView = document.getElementById('galleryView');
        const detailView = document.getElementById('detailView');
        const homeLink = document.getElementById('homeLink');
        const backToGallery = document.getElementById('backToGallery');

        function escapeHtml(value) {
            return String(value ?? '').replace(/[&<>"']/g, char => ({
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#39;'
            }[char]));
        }

        function normalize(value) {
            return String(value || '').replace(/\s+/g, '').toLowerCase();
        }

        function statValue(record, key) {
            const value = record.stats && record.stats[key];
            return value === undefined || value === null || value === '' ? '-' : value;
        }

        function hexToRgba(hex, alpha) {
            const normalizedHex = String(hex || FALLBACK_ATTRIBUTE_COLOR).replace('#', '');
            const value = normalizedHex.length === 3
                ? normalizedHex.split('').map(char => char + char).join('')
                : normalizedHex.padEnd(6, '0').slice(0, 6);
            const red = parseInt(value.slice(0, 2), 16);
            const green = parseInt(value.slice(2, 4), 16);
            const blue = parseInt(value.slice(4, 6), 16);
            return `rgba(${red}, ${green}, ${blue}, ${alpha})`;
        }

        function recordAttributes(record) {
            return record.attributes && record.attributes.length ? record.attributes : ['普通'];
        }

        function attributeColor(attr) {
            return ATTRIBUTE_COLORS[attr] || FALLBACK_ATTRIBUTE_COLOR;
        }

        function recordBackgroundStyle(record, mode = 'card') {
            const colors = recordAttributes(record).slice(0, 2).map(attributeColor);
            const firstColor = colors[0] || FALLBACK_ATTRIBUTE_COLOR;
            const secondColor = colors[1] || firstColor;

            if (mode === 'detail') {
                return `--sprite-bg: linear-gradient(135deg, ${hexToRgba(firstColor, 0.95)}, ${hexToRgba(secondColor, 0.78)}), radial-gradient(circle at top right, rgba(255,255,255,0.22), transparent 42%);`;
            }

            return `--sprite-bg: linear-gradient(180deg, rgba(255,255,255,0.88), rgba(255,255,255,0.72)), linear-gradient(135deg, ${hexToRgba(firstColor, 1)}, ${hexToRgba(secondColor, 1)});`;
        }

        function renderAttributeLogo(attr) {
            const logo = ATTRIBUTE_LOGOS[attr] || '';
            return logo
                ? `<img class="type-logo" src="${escapeHtml(logo)}" alt="" aria-hidden="true" onerror="this.style.display='none'">`
                : '';
        }

        function renderAttributeChip(attr) {
            return `<span class="type-chip">${renderAttributeLogo(attr)}<span>${escapeHtml(attr)}</span></span>`;
        }

        function renderAttributeChips(record) {
            const attributes = record.attributes && record.attributes.length ? record.attributes : ['无属性'];
            return attributes.map(renderAttributeChip).join('');
        }

        function recordEggGroups(record) {
            return Array.isArray(record.eggGroups) ? record.eggGroups.filter(Boolean) : [];
        }

        function buildEggGroups() {
            eggGroups = [...new Set(records.flatMap(recordEggGroups))].sort((a, b) => a.localeCompare(b, 'zh-CN'));
        }

        function renderDetailChips(record) {
            const attributeChips = renderAttributeChips(record);
            const groups = recordEggGroups(record);
            const eggChips = groups.length
                ? groups.map(group => `<span class="type-chip egg-chip">蛋组：${escapeHtml(group)}</span>`).join('')
                : '<span class="type-chip egg-chip">蛋组：未知</span>';

            return attributeChips + eggChips;
        }

        function showGallery(updateHash = true) {
            galleryView.classList.add('active');
            detailView.classList.remove('active');
            homeLink.style.display = 'inline-flex';
            backToGallery.style.display = 'none';
            if (updateHash) history.pushState('', document.title, location.pathname + location.search);
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function showDetail(id, updateHash = true) {
            selectedId = id;
            renderDetail();
            galleryView.classList.remove('active');
            detailView.classList.add('active');
            homeLink.style.display = 'none';
            backToGallery.style.display = 'inline-flex';
            if (updateHash) location.hash = encodeURIComponent(id);
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function renderFilters() {
            filters.innerHTML = [
                `<button class="filter-chip ${activeAttribute === '' ? 'active' : ''}" type="button" data-attr="">全部</button>`,
                ...ATTRIBUTES.map(attr => (
                    `<button class="filter-chip ${activeAttribute === attr ? 'active' : ''}" type="button" data-attr="${escapeHtml(attr)}">${renderAttributeLogo(attr)}<span>${escapeHtml(attr)}</span></button>`
                ))
            ].join('');

            filters.querySelectorAll('.filter-chip').forEach(button => {
                button.addEventListener('click', () => {
                    activeAttribute = button.dataset.attr || '';
                    applyFilters();
                });
            });

            eggFilters.innerHTML = [
                `<button class="filter-chip ${activeEggGroup === '' ? 'active' : ''}" type="button" data-egg-group="">全部</button>`,
                ...eggGroups.map(group => (
                    `<button class="filter-chip ${activeEggGroup === group ? 'active' : ''}" type="button" data-egg-group="${escapeHtml(group)}">${escapeHtml(group)}</button>`
                ))
            ].join('');

            eggFilters.querySelectorAll('.filter-chip').forEach(button => {
                button.addEventListener('click', () => {
                    activeEggGroup = button.dataset.eggGroup || '';
                    applyFilters();
                });
            });
        }

        function applyFilters() {
            const keyword = normalize(searchInput.value);
            filteredRecords = records.filter(record => {
                const searchableText = normalize([record.searchText, ...recordEggGroups(record)].join(''));
                const matchesKeyword = !keyword || searchableText.includes(keyword);
                const matchesAttribute = !activeAttribute || recordAttributes(record).includes(activeAttribute);
                const matchesEggGroup = !activeEggGroup || recordEggGroups(record).includes(activeEggGroup);
                return matchesKeyword && matchesAttribute && matchesEggGroup;
            });
            renderFilters();
            renderCards();
        }

        function renderCards() {
            resultCount.textContent = `共 ${filteredRecords.length} / ${records.length} 条`;
            if (filteredRecords.length === 0) {
                cardGrid.innerHTML = '<div class="panel empty-state">没有匹配的精灵。</div>';
                return;
            }

            cardGrid.innerHTML = filteredRecords.map(record => `
                <button class="sprite-card" type="button" data-id="${escapeHtml(record.id)}" style="${recordBackgroundStyle(record)}">
                    <div class="card-image-wrap">
                        <img class="card-image" src="${escapeHtml(record.portrait)}" alt="${escapeHtml(record.title)}" loading="lazy" onerror="this.style.display='none'">
                    </div>
                    <div class="card-number">NO.${escapeHtml(record.number)}</div>
                    <div class="card-title">${escapeHtml(record.title)}</div>
                    <div class="card-types">
                        ${renderAttributeChips(record)}
                    </div>
                </button>
            `).join('');

            cardGrid.querySelectorAll('.sprite-card').forEach(card => {
                card.addEventListener('click', () => showDetail(card.dataset.id));
            });
        }

        function renderDetail() {
            const record = records.find(item => item.id === selectedId);
            if (!record) {
                detailPanel.innerHTML = '<div class="empty-state">请选择一个精灵查看详情。</div>';
                return;
            }

            const total = statValue(record, '种族值');
            const abilities = record.abilities && record.abilities.length
                ? record.abilities.map(ability => `
                    <div class="ability">
                        <div class="ability-name">${escapeHtml(ability.name)}</div>
                        <div class="ability-desc">${escapeHtml(ability.description || '暂无描述')}</div>
                    </div>
                `).join('')
                : '<div class="empty-state">暂无特性资料。</div>';

            const skills = record.skills && record.skills.length
                ? record.skills.map(skill => `
                    <tr>
                        <td data-label="等级">${escapeHtml(skill.level)}</td>
                        <td data-label="技能"><strong>${escapeHtml(skill.name)}</strong></td>
                        <td data-label="能量">${escapeHtml(skill.cost || '-')}</td>
                        <td data-label="类别">${escapeHtml(skill.category || '-')}</td>
                        <td data-label="威力">${escapeHtml(skill.power || '-')}</td>
                        <td data-label="描述" class="skill-desc">${escapeHtml(skill.description || '-')}</td>
                    </tr>
                `).join('')
                : '<tr><td colspan="6">暂无技能资料。</td></tr>';

            detailPanel.innerHTML = `
                <div class="detail-hero" style="${recordBackgroundStyle(record, 'detail')}">
                    <div class="portrait-wrap">
                        <img class="portrait" src="${escapeHtml(record.portrait)}" alt="${escapeHtml(record.title)}" onerror="this.style.display='none'">
                    </div>
                    <div>
                        <div class="detail-number">No.${escapeHtml(record.number)}</div>
                        <h2 class="detail-title">${escapeHtml(record.title)}</h2>
                        <div class="type-row">
                            ${renderDetailChips(record)}
                        </div>
                        <p class="hero-copy">${escapeHtml(record.description || '暂无简介。')}</p>
                    </div>
                </div>

                <div class="detail-body">
                    <div class="info-grid">
                        <div class="info-tile">
                            <div class="info-label">种族值</div>
                            <div class="info-value">${escapeHtml(total)}</div>
                        </div>
                        <div class="info-tile">
                            <div class="info-label">身高</div>
                            <div class="info-value">${escapeHtml(record.height || '-')}</div>
                        </div>
                        <div class="info-tile">
                            <div class="info-label">体重</div>
                            <div class="info-value">${escapeHtml(record.weight || '-')}</div>
                        </div>
                    </div>

                    <div class="section">
                        <h3 class="section-title">精灵果实</h3>
                        <div class="fruit-card">
                            <div class="fruit-image-wrap">
                                <img class="fruit-image" src="${escapeHtml(record.icon || record.portrait)}" alt="${escapeHtml(record.title)} 精灵果实" onerror="this.style.display='none'">
                            </div>
                            <p class="ability-desc">${escapeHtml(record.title)} 对应的精灵果实图片。</p>
                        </div>
                    </div>

                    <div class="section">
                        <h3 class="section-title">分布</h3>
                        <p class="ability-desc">${escapeHtml(record.distribution || '暂无分布资料。')}</p>
                    </div>

                    <div class="section">
                        <h3 class="section-title">能力值</h3>
                        <div class="stats-grid">
                            ${STAT_LABELS.map(label => {
                                const value = Number(record.stats[label] || 0);
                                const width = Math.max(3, Math.min(100, Math.round(value / STAT_MAX * 100)));
                                return `
                                    <div class="stat-row">
                                        <div class="stat-name">${label}</div>
                                        <div class="stat-bar"><div class="stat-fill" style="width:${width}%"></div></div>
                                        <div class="stat-value">${escapeHtml(record.stats[label] || '-')}</div>
                                    </div>
                                `;
                            }).join('')}
                        </div>
                    </div>

                    <div class="section">
                        <h3 class="section-title">特性</h3>
                        <div class="ability-list">${abilities}</div>
                    </div>

                    <div class="section">
                        <h3 class="section-title">技能</h3>
                        <div class="skill-table-wrap">
                            <table>
                                <thead>
                                    <tr>
                                        <th>等级</th>
                                        <th>技能</th>
                                        <th>能量</th>
                                        <th>类别</th>
                                        <th>威力</th>
                                        <th>描述</th>
                                    </tr>
                                </thead>
                                <tbody>${skills}</tbody>
                            </table>
                        </div>
                    </div>

                    <div class="section">
                        <h3 class="section-title">来源</h3>
                        <a class="source-link" href="${escapeHtml(record.url)}" target="_blank" rel="noreferrer">洛克王国世界 WIKI 原页面</a>
                    </div>
                </div>
            `;
        }

        async function loadHandbook() {
            try {
                const response = await fetch('handbook_data.json');
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                const data = await response.json();
                records = data.records || [];
                buildEggGroups();
                filteredRecords = records;

                renderFilters();
                renderCards();

                const hashId = decodeURIComponent(location.hash.replace(/^#/, ''));
                if (records.some(record => record.id === hashId)) {
                    showDetail(hashId, false);
                }
            } catch (error) {
                console.error(error);
                resultCount.textContent = '加载失败';
                cardGrid.innerHTML = '<div class="panel empty-state">请确认 handbook_data.json 存在并可访问。</div>';
            }
        }

        searchInput.addEventListener('input', applyFilters);
        clearSearch.addEventListener('click', () => {
            searchInput.value = '';
            activeAttribute = '';
            activeEggGroup = '';
            applyFilters();
        });
        backToGallery.addEventListener('click', () => showGallery());
        window.addEventListener('hashchange', () => {
            const hashId = decodeURIComponent(location.hash.replace(/^#/, ''));
            if (hashId && records.some(record => record.id === hashId)) {
                showDetail(hashId, false);
            } else {
                showGallery(false);
            }
        });

        loadHandbook();
    </script>
</body>
</html>
