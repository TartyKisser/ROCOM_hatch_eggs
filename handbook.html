<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>精灵图鉴 - 洛克王国世界工具站</title>
    <style>
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --text: #1e293b;
            --text-secondary: #64748b;
            --card-bg: rgba(255,255,255,0.92);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            padding: 20px;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            color: var(--text);
            background: url('./web_images/bg.jpg') no-repeat center center fixed,
                        linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            background-size: cover;
            display: flex;
            flex-direction: column;
        }

        .container {
            width: 95%;
            max-width: 960px;
            margin: 0 auto;
            flex: 1;
        }

        header {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            padding: 46px 20px 34px;
            color: white;
            text-shadow: 0 2px 4px rgba(0,0,0,0.4);
        }

        .hero-eyebrow {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 6px 12px;
            margin-bottom: 16px;
            border: 1px solid rgba(255,255,255,0.32);
            border-radius: 999px;
            background: rgba(15,23,42,0.22);
            color: rgba(255,255,255,0.9);
            font-size: 0.78rem;
            font-weight: 800;
            letter-spacing: 0.08em;
        }

        .main-title {
            font-size: 2.5rem;
            line-height: 1.12;
            margin-bottom: 12px;
            color: #ffffff;
            font-weight: 900;
            text-shadow: 0 4px 18px rgba(15,23,42,0.45);
        }

        .desc-font {
            font-size: 1.1rem;
            font-family: "Microsoft YaHei", "STHeiti", sans-serif;
            color: rgba(255,255,255,0.94);
            opacity: 0.98;
            text-shadow: 0 2px 8px rgba(15,23,42,0.28);
        }

        .card {
            background: var(--card-bg);
            border: 1px solid rgba(255,255,255,0.55);
            border-radius: 18px;
            padding: 34px;
            box-shadow: 0 18px 45px rgba(15, 23, 42, 0.18);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }

        .section-title {
            font-size: 1.35rem;
            color: var(--primary-dark);
            margin-bottom: 14px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .section-title::before {
            content: '';
            width: 4px;
            height: 24px;
            background: var(--primary);
            border-radius: 2px;
        }

        .placeholder-copy {
            color: var(--text-secondary);
            line-height: 1.8;
            margin-bottom: 24px;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 12px 22px;
            border-radius: 12px;
            border: 1px solid rgba(99,102,241,0.22);
            background: rgba(255,255,255,0.92);
            color: var(--primary-dark);
            font-size: 1rem;
            font-weight: 700;
            text-decoration: none;
            box-shadow: 0 8px 22px rgba(15, 23, 42, 0.12);
            transition: transform 0.2s ease, border-color 0.2s ease;
        }

        .btn:hover {
            transform: translateY(-2px);
            border-color: rgba(99,102,241,0.48);
        }

        .footer-beian {
            text-align: center;
            margin-top: 40px;
            padding-bottom: 20px;
            font-size: 13px;
        }

        .footer-beian a {
            color: rgba(255,255,255,0.8);
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 5px;
            transition: color 0.3s;
        }

        .footer-beian a:hover {
            color: #ffffff;
        }

        @media (max-width: 768px) {
            body {
                padding: 16px;
            }

            .main-title {
                font-size: 1.8rem;
            }

            .card {
                padding: 24px;
                border-radius: 14px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="hero-eyebrow">HANDBOOK</div>
            <h1 class="main-title">精灵图鉴</h1>
            <p class="desc-font">资料页面建设中</p>
        </header>

        <main class="card">
            <h2 class="section-title">精灵图鉴</h2>
            <p class="placeholder-copy">这里会放置精灵资料、属性、种族值与图片信息。</p>
            <a class="btn" href="index.html">‹ 返回主页</a>
        </main>
    </div>

    <div class="footer-beian">
        <a href="https://beian.mps.gov.cn/#/query/webSearch?code=32058102002843" rel="noreferrer" target="_blank">
            <img src="https://img.alicdn.com/tfs/TB1..50QpXXXXX7XpXXXXXXXXXX-40-40.png" alt="" style="width: 20px; height: 20px;">
            苏公网安备32058102002843号
        </a>
    </div>
</body>
</html>
