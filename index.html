<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>洛克王国世界工具站</title>
    <style>
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --secondary: #ec4899;
            --text: #1e293b;
            --text-secondary: #64748b;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            padding: 20px;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            color: var(--text);
            background: url('./web_images/bg.jpg') no-repeat center center fixed,
                        linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            background-size: cover;
            display: flex;
            flex-direction: column;
        }

        .container {
            width: 95%;
            max-width: 1180px;
            margin: 0 auto;
            flex: 1;
        }

        header {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            padding: 50px 20px 36px;
            color: white;
            text-shadow: 0 2px 4px rgba(0,0,0,0.4);
        }

        .hero-eyebrow {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 6px 12px;
            margin-bottom: 16px;
            border: 1px solid rgba(255,255,255,0.32);
            border-radius: 999px;
            background: rgba(15,23,42,0.22);
            color: rgba(255,255,255,0.9);
            font-size: 0.78rem;
            font-weight: 800;
            letter-spacing: 0.08em;
        }

        .main-title {
            font-size: 3rem;
            line-height: 1.1;
            margin-bottom: 12px;
            color: #ffffff;
            font-weight: 900;
            text-shadow: 0 4px 18px rgba(15,23,42,0.45);
        }

        .desc-font {
            font-size: 1.1rem;
            font-family: "Microsoft YaHei", "STHeiti", sans-serif;
            margin-bottom: 20px;
            color: rgba(255,255,255,0.94);
            opacity: 0.98;
        }

        .source-panel {
            max-width: 820px;
            background: rgba(255,255,255,0.16);
            border: 1px solid rgba(255,255,255,0.28);
            color: #ffffff;
            padding: 14px 18px;
            border-radius: 18px;
            font-size: 0.95rem;
            line-height: 1.7;
            box-shadow: 0 14px 35px rgba(15,23,42,0.16);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
        }

        .source-links {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 10px;
        }

        .box-link {
            display: inline-flex;
            color: #ffffff;
            font-weight: bold;
            text-decoration: none;
            padding: 6px 10px;
            border-radius: 999px;
            background: rgba(255,255,255,0.16);
            transition: color 0.3s;
        }

        .box-link:hover {
            color: #fef3c7;
        }

        .feature-grid {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 18px;
            margin-bottom: 28px;
        }

        .feature-card {
            min-height: 250px;
            padding: 24px;
            border: 1px solid rgba(255,255,255,0.55);
            border-radius: 18px;
            background:
                linear-gradient(180deg, rgba(255,255,255,0.95), rgba(255,255,255,0.82)),
                radial-gradient(circle at top right, rgba(236,72,153,0.2), transparent 42%);
            color: var(--text);
            box-shadow: 0 18px 45px rgba(15, 23, 42, 0.18);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            text-decoration: none;
            overflow: hidden;
            position: relative;
            transition: transform 0.22s ease, box-shadow 0.22s ease, border-color 0.22s ease;
        }

        .feature-card > * {
            position: relative;
            z-index: 1;
        }

        .feature-card:not(.visual-card)::after {
            content: '';
            position: absolute;
            right: -36px;
            bottom: -36px;
            width: 140px;
            height: 140px;
            border-radius: 50%;
            border: 28px solid rgba(99,102,241,0.11);
        }

        .feature-card:hover {
            transform: translateY(-6px);
            border-color: rgba(99,102,241,0.45);
            box-shadow: 0 24px 55px rgba(15, 23, 42, 0.26);
        }

        .visual-card {
            min-height: 300px;
            color: white;
            background: white;
            border-color: rgba(255,255,255,0.32);
            isolation: isolate;
        }

        .visual-card::before {
            content: '';
            position: absolute;
            inset: -18px;
            background: var(--feature-image) center / cover no-repeat;
            filter: blur(2px) saturate(1.12);
            transform: scale(1.08);
            transition: transform 0.28s ease, filter 0.28s ease;
            z-index: 0;
        }

        .visual-card::after {
            content: '';
            position: absolute;
            inset: 0;
            background:
                linear-gradient(180deg, rgba(15,23,42,0.1), rgba(15,23,42,0.78)),
                radial-gradient(circle at 35% 18%, rgba(255,255,255,0.24), transparent 34%);
            z-index: 0;
        }

        .visual-card:hover::before {
            transform: scale(1.14);
            filter: blur(1px) saturate(1.2);
        }

        .nest-card {
            --feature-image: url('./web_images/nest.png');
        }

        .handbook-card {
            --feature-image: url('./web_images/handbook.png');
        }

        .feature-card.placeholder {
            background:
                linear-gradient(180deg, rgba(255,255,255,0.9), rgba(241,245,249,0.78)),
                radial-gradient(circle at top right, rgba(34,197,94,0.16), transparent 44%);
            cursor: default;
        }

        .feature-card.placeholder:hover {
            transform: none;
            border-color: rgba(255,255,255,0.55);
            box-shadow: 0 18px 45px rgba(15, 23, 42, 0.18);
        }

        .feature-mark {
            width: 54px;
            height: 54px;
            border-radius: 16px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.45rem;
            font-weight: 900;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            box-shadow: 0 10px 24px rgba(99,102,241,0.35);
            margin-bottom: 22px;
            position: relative;
            z-index: 1;
        }

        .feature-card:nth-child(2) .feature-mark {
            background: linear-gradient(135deg, #0ea5e9, #22c55e);
            box-shadow: 0 10px 24px rgba(14,165,233,0.3);
        }

        .feature-card:nth-child(3) .feature-mark {
            background: linear-gradient(135deg, #f59e0b, #ef4444);
            box-shadow: 0 10px 24px rgba(245,158,11,0.28);
        }

        .feature-title {
            font-size: 1.45rem;
            line-height: 1.25;
            color: var(--primary-dark);
            margin-bottom: 12px;
            position: relative;
            z-index: 1;
        }

        .visual-card .feature-title {
            color: #ffffff;
            text-shadow: 0 3px 14px rgba(0,0,0,0.42);
        }

        .feature-copy {
            color: var(--text-secondary);
            line-height: 1.65;
            font-size: 0.98rem;
            position: relative;
            z-index: 1;
        }

        .visual-card .feature-copy {
            color: rgba(255,255,255,0.9);
        }

        .feature-action {
            margin-top: 28px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: var(--primary-dark);
            font-weight: 800;
            position: relative;
            z-index: 1;
        }

        .visual-card .feature-action {
            color: #ffffff;
        }

        .feature-card.placeholder .feature-action {
            color: var(--text-secondary);
        }

        .footer-beian {
            text-align: center;
            margin-top: 40px;
            padding-bottom: 20px;
            font-size: 13px;
        }

        .footer-beian a {
            color: rgba(255,255,255,0.8);
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 5px;
            transition: color 0.3s;
        }

        .footer-beian a:hover {
            color: #ffffff;
        }

        @media (max-width: 768px) {
            body {
                padding: 16px;
            }

            .main-title {
                font-size: 1.8rem;
            }

            .feature-grid {
                grid-template-columns: 1fr;
            }

            .feature-card {
                min-height: 210px;
                border-radius: 14px;
            }

            .source-panel {
                width: 95%;
                box-sizing: border-box;
                padding: 12px 15px;
                font-size: 0.85rem;
                border-radius: 12px;
                word-wrap: break-word;
                word-break: break-all;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="hero-eyebrow">ROCOM TOOLS</div>
            <h1 class="main-title">洛克王国世界工具站</h1>
            <p class="desc-font">把常用资料和计算工具放在一个更顺手的地方。</p>

            <div class="source-panel">
                <span>免费开放使用，数据参考洛克王国世界 WIKI，欢迎一起完善。</span>
                <div class="source-links">
                    <a href="https://github.com/TartyKisser/ROCOM_hatch_eggs" target="_blank" class="box-link">GitHub 项目</a>
                    <a href="https://wiki.biligame.com/rocom" target="_blank" class="box-link">数据来源 WIKI</a>
                </div>
            </div>
        </header>

        <main class="feature-grid">
            <a class="feature-card visual-card nest-card" href="hatch.html">
                <div>
                    <span class="feature-mark">窝</span>
                    <h2 class="feature-title">家园小窝排布系统</h2>
                    <p class="feature-copy">输入精灵与性别，生成家园小窝排布方案，计算可配对路径。</p>
                </div>
                <span class="feature-action">进入系统 <span>›</span></span>
            </a>

            <a class="feature-card visual-card handbook-card" href="handbook.html">
                <div>
                    <span class="feature-mark">鉴</span>
                    <h2 class="feature-title">精灵图鉴</h2>
                    <p class="feature-copy">精灵资料、属性、种族值与图片信息。</p>
                </div>
                <span class="feature-action">查看图鉴 <span>›</span></span>
            </a>

            <div class="feature-card placeholder">
                <div>
                    <span class="feature-mark">新</span>
                    <h2 class="feature-title">更多功能，敬请期待</h2>
                    <p class="feature-copy">新的工具会继续放在这里。</p>
                </div>
                <span class="feature-action">开发中</span>
            </div>
        </main>
    </div>

    <div class="footer-beian">
        <a href="https://beian.mps.gov.cn/#/query/webSearch?code=32058102002843" rel="noreferrer" target="_blank">
            <img src="https://img.alicdn.com/tfs/TB1..50QpXXXXX7XpXXXXXXXXXX-40-40.png" alt="" style="width: 20px; height: 20px;">
            苏公网安备32058102002843号
        </a>
    </div>
</body>
</html>
