<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>世界地图资料 - 洛克王国世界工具站</title>
    <style>
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --secondary: #ec4899;
            --text: #1e293b;
            --text-secondary: #64748b;
            --border: rgba(226,232,240,0.9);
            --panel: rgba(255,255,255,0.92);
            --panel-soft: rgba(248,250,252,0.88);
            --shadow: 0 18px 45px rgba(15, 23, 42, 0.18);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            padding: 20px;
            font-family: 'Segoe UI', system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
            color: var(--text);
            background: url('./web_images/bg.jpg') no-repeat center center fixed,
                        linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            background-size: cover;
        }

        .container {
            width: 96%;
            max-width: 1600px;
            margin: 0 auto;
        }

        header {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            padding: 42px 20px 28px;
            color: white;
        }

        .hero-eyebrow {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 6px 12px;
            margin-bottom: 16px;
            border: 1px solid rgba(255,255,255,0.32);
            border-radius: 999px;
            background: rgba(15,23,42,0.22);
            color: rgba(255,255,255,0.9);
            font-size: 0.78rem;
            font-weight: 800;
            letter-spacing: 0.08em;
        }

        .main-title {
            font-size: 2.6rem;
            line-height: 1.12;
            margin-bottom: 10px;
            font-weight: 900;
            text-shadow: 0 4px 18px rgba(15,23,42,0.45);
        }

        .desc-font {
            max-width: 760px;
            font-size: 1.05rem;
            color: rgba(255,255,255,0.94);
            text-shadow: 0 2px 8px rgba(15,23,42,0.28);
        }

        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 16px;
            margin-bottom: 18px;
        }

        .topbar-actions {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            min-height: 42px;
            padding: 10px 16px;
            border: 1px solid rgba(255,255,255,0.48);
            border-radius: 12px;
            background: rgba(255,255,255,0.9);
            color: var(--primary-dark);
            font-size: 0.95rem;
            font-weight: 800;
            text-decoration: none;
            cursor: pointer;
            box-shadow: 0 8px 22px rgba(15,23,42,0.12);
            transition: transform 0.2s ease, border-color 0.2s ease;
        }

        .btn:hover {
            transform: translateY(-2px);
            border-color: rgba(99,102,241,0.48);
        }

        .count-pill {
            display: inline-flex;
            align-items: center;
            min-height: 36px;
            padding: 8px 12px;
            border-radius: 999px;
            background: rgba(255,255,255,0.84);
            color: var(--text-secondary);
            font-size: 0.9rem;
            font-weight: 800;
        }

        .panel {
            background: var(--panel);
            border: 1px solid rgba(255,255,255,0.55);
            border-radius: 18px;
            box-shadow: var(--shadow);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }

        .source-panel {
            display: grid;
            grid-template-columns: minmax(0, 1fr) auto;
            gap: 16px;
            align-items: center;
            padding: 16px 18px;
            margin-bottom: 18px;
            background:
                linear-gradient(135deg, rgba(255,255,255,0.96), rgba(255,255,255,0.84)),
                radial-gradient(circle at top right, rgba(34,197,94,0.14), transparent 44%);
        }

        .source-title {
            color: var(--primary-dark);
            font-size: 1.08rem;
            font-weight: 950;
            margin-bottom: 5px;
        }

        .source-copy {
            color: var(--text-secondary);
            line-height: 1.65;
            font-size: 0.92rem;
            font-weight: 700;
        }

        .source-link {
            white-space: nowrap;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(4, minmax(0, 1fr));
            gap: 12px;
            margin-bottom: 18px;
        }

        .stat-card {
            padding: 16px;
            background: rgba(255,255,255,0.9);
        }

        .stat-value {
            color: var(--primary-dark);
            font-size: 1.55rem;
            line-height: 1;
            font-weight: 950;
        }

        .stat-label {
            margin-top: 7px;
            color: var(--text-secondary);
            font-size: 0.84rem;
            font-weight: 850;
        }

        .layout {
            display: grid;
            grid-template-columns: minmax(270px, 0.34fr) minmax(0, 1fr);
            gap: 18px;
            align-items: start;
        }

        .sidebar {
            position: sticky;
            top: 18px;
            overflow: hidden;
        }

        .panel-head {
            padding: 17px 18px;
            border-bottom: 1px solid var(--border);
            background: rgba(255,255,255,0.7);
        }

        .panel-title {
            color: var(--primary-dark);
            font-size: 1.12rem;
            font-weight: 950;
        }

        .panel-subtitle {
            margin-top: 4px;
            color: var(--text-secondary);
            font-size: 0.84rem;
            font-weight: 750;
        }

        .group-list {
            display: grid;
            gap: 8px;
            max-height: calc(100vh - 210px);
            overflow: auto;
            padding: 14px;
        }

        .group-btn {
            display: grid;
            grid-template-columns: minmax(0, 1fr) auto;
            align-items: center;
            gap: 10px;
            min-height: 38px;
            padding: 9px 11px;
            border: 1px solid rgba(99,102,241,0.14);
            border-radius: 12px;
            background: rgba(99,102,241,0.06);
            color: var(--text);
            font: inherit;
            font-size: 0.9rem;
            font-weight: 900;
            cursor: pointer;
            text-align: left;
        }

        .group-btn.active {
            color: white;
            border-color: transparent;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            box-shadow: 0 10px 22px rgba(99,102,241,0.22);
        }

        .group-count {
            color: inherit;
            opacity: 0.76;
            font-size: 0.78rem;
            font-weight: 900;
        }

        .content {
            min-width: 0;
        }

        .controls {
            padding: 16px;
            margin-bottom: 18px;
        }

        .search-row {
            display: grid;
            grid-template-columns: minmax(0, 1fr) minmax(220px, 0.36fr) auto;
            gap: 12px;
            align-items: center;
        }

        .search-input,
        .select-input {
            width: 100%;
            min-height: 46px;
            padding: 12px 14px;
            border: 2px solid var(--border);
            border-radius: 13px;
            font: inherit;
            font-size: 0.95rem;
            color: var(--text);
            background: rgba(255,255,255,0.94);
            outline: none;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
        }

        .search-input:focus,
        .select-input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(99,102,241,0.12);
        }

        .map-preview {
            position: relative;
            height: min(64vh, 620px);
            min-height: 430px;
            margin-bottom: 18px;
            overflow: hidden;
            background: #dbeafe;
            cursor: grab;
            user-select: none;
            touch-action: none;
        }

        .map-preview.is-dragging {
            cursor: grabbing;
        }

        .map-layer,
        .marker-layer {
            position: absolute;
            inset: 0;
        }

        .map-layer {
            z-index: 1;
        }

        .marker-layer {
            z-index: 2;
        }

        .map-tile {
            position: absolute;
            width: 256px;
            height: 256px;
            object-fit: cover;
            pointer-events: none;
            user-select: none;
            -webkit-user-drag: none;
        }

        .map-marker {
            position: absolute;
            width: 30px;
            height: 30px;
            padding: 3px;
            border: 1px solid rgba(255,255,255,0.86);
            border-radius: 50%;
            background: rgba(255,255,255,0.9);
            box-shadow: 0 6px 14px rgba(15,23,42,0.22);
            transform: translate(-50%, -50%);
            cursor: pointer;
            transition: transform 0.15s ease, box-shadow 0.15s ease;
        }

        .map-marker img {
            width: 100%;
            height: 100%;
            display: block;
            object-fit: contain;
        }

        .map-marker:hover {
            z-index: 4;
            transform: translate(-50%, -50%) scale(1.18);
            box-shadow: 0 10px 22px rgba(15,23,42,0.28);
        }

        .preview-label {
            position: absolute;
            left: 16px;
            top: 14px;
            z-index: 5;
            display: inline-flex;
            align-items: center;
            min-height: 32px;
            padding: 6px 10px;
            border-radius: 999px;
            background: rgba(255,255,255,0.88);
            color: var(--primary-dark);
            font-size: 0.82rem;
            font-weight: 950;
            box-shadow: 0 8px 18px rgba(15,23,42,0.12);
        }

        .map-tools {
            position: absolute;
            right: 14px;
            top: 14px;
            z-index: 5;
            display: grid;
            gap: 8px;
        }

        .map-tool-btn {
            width: 36px;
            height: 36px;
            border: 1px solid rgba(255,255,255,0.72);
            border-radius: 11px;
            background: rgba(255,255,255,0.92);
            color: var(--primary-dark);
            font: inherit;
            font-size: 1.18rem;
            font-weight: 950;
            box-shadow: 0 8px 18px rgba(15,23,42,0.14);
            cursor: pointer;
        }

        .map-tip {
            position: absolute;
            left: 16px;
            bottom: 14px;
            z-index: 5;
            max-width: calc(100% - 32px);
            padding: 6px 10px;
            border-radius: 999px;
            background: rgba(15,23,42,0.64);
            color: rgba(255,255,255,0.94);
            font-size: 0.78rem;
            font-weight: 800;
        }

        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 14px;
        }

        .location-card {
            overflow: hidden;
            background: rgba(255,255,255,0.93);
        }

        .location-image {
            width: 100%;
            aspect-ratio: 16 / 9;
            display: block;
            background: rgba(99,102,241,0.08);
            object-fit: cover;
        }

        .location-body {
            padding: 14px;
        }

        .location-top {
            display: grid;
            grid-template-columns: 34px minmax(0, 1fr);
            gap: 10px;
            align-items: center;
            margin-bottom: 10px;
        }

        .category-icon {
            width: 34px;
            height: 34px;
            padding: 5px;
            border-radius: 10px;
            background: rgba(99,102,241,0.08);
            object-fit: contain;
        }

        .location-title {
            overflow: hidden;
            color: var(--text);
            font-size: 1rem;
            line-height: 1.25;
            font-weight: 950;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .location-meta {
            margin-top: 3px;
            color: var(--text-secondary);
            font-size: 0.8rem;
            font-weight: 800;
        }

        .location-desc {
            min-height: 22px;
            color: var(--text-secondary);
            font-size: 0.86rem;
            line-height: 1.55;
        }

        .location-foot {
            display: flex;
            flex-wrap: wrap;
            gap: 7px;
            margin-top: 12px;
        }

        .tag {
            display: inline-flex;
            align-items: center;
            min-height: 24px;
            padding: 4px 8px;
            border-radius: 999px;
            background: rgba(99,102,241,0.08);
            color: var(--primary-dark);
            font-size: 0.76rem;
            font-weight: 900;
        }

        .empty {
            padding: 28px;
            color: var(--text-secondary);
            font-weight: 850;
            text-align: center;
        }

        @media (max-width: 980px) {
            .layout {
                grid-template-columns: 1fr;
            }

            .sidebar {
                position: static;
            }

            .group-list {
                grid-template-columns: repeat(auto-fit, minmax(128px, 1fr));
                max-height: none;
            }

            .search-row,
            .source-panel,
            .stats {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 640px) {
            body {
                padding: 16px;
            }

            header {
                padding: 30px 10px 22px;
            }

            .main-title {
                font-size: 1.9rem;
            }

            .topbar {
                align-items: stretch;
                flex-direction: column;
            }

            .topbar-actions {
                width: 100%;
            }

            .btn,
            .source-link {
                flex: 1 1 auto;
            }

            .map-preview {
                height: 360px;
                min-height: 360px;
            }

            .card-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="hero-eyebrow">WORLD MAP</div>
            <h1 class="main-title">洛克王国世界地图资料</h1>
            <p class="desc-font">按分类浏览地图点位、坐标、图片与采集信息。</p>
        </header>

        <div class="topbar">
            <div class="topbar-actions">
                <a class="btn" href="index.html">返回首页</a>
                <a class="btn" href="https://map.17173.com/rocom/maps/shijie" target="_blank" rel="noreferrer">打开原地图</a>
            </div>
            <div class="count-pill" id="resultCount">正在加载地图数据...</div>
        </div>

        <section class="panel source-panel" aria-label="数据来源">
            <div>
                <div class="source-title">数据来源与感谢</div>
                <div class="source-copy">
                    本页地图点位数据整理自 17173 洛克王国世界互动地图。感谢 17173 与地图贡献者提供和维护这些公开资料，本工具站仅做本地化浏览与筛选展示。
                </div>
            </div>
            <a class="btn source-link" href="https://map.17173.com/rocom/maps/shijie" target="_blank" rel="noreferrer">查看来源</a>
        </section>

        <section class="stats" aria-label="地图数据统计">
            <article class="panel stat-card">
                <div class="stat-value" id="statLocations">-</div>
                <div class="stat-label">地图点位</div>
            </article>
            <article class="panel stat-card">
                <div class="stat-value" id="statCategories">-</div>
                <div class="stat-label">点位分类</div>
            </article>
            <article class="panel stat-card">
                <div class="stat-value" id="statGroups">-</div>
                <div class="stat-label">分类分组</div>
            </article>
            <article class="panel stat-card">
                <div class="stat-value" id="statUpdated">-</div>
                <div class="stat-label">数据更新时间</div>
            </article>
        </section>

        <main class="layout">
            <aside class="panel sidebar">
                <div class="panel-head">
                    <div class="panel-title">分类分组</div>
                    <div class="panel-subtitle">点击后筛选右侧全部点位</div>
                </div>
                <div class="group-list" id="groupList"></div>
            </aside>

            <section class="content">
                <div class="panel controls">
                    <div class="search-row">
                        <input class="search-input" id="searchInput" type="search" placeholder="搜索点位、分类、作者或坐标" autocomplete="off">
                        <select class="select-input" id="categorySelect" aria-label="选择分类">
                            <option value="">全部分类</option>
                        </select>
                        <button class="btn" id="clearButton" type="button">清空</button>
                    </div>
                </div>

                <div class="panel map-preview" id="mapPreview" aria-label="地图预览">
                    <div class="map-layer" id="mapLayer"></div>
                    <div class="marker-layer" id="markerLayer"></div>
                    <div class="preview-label" id="previewLabel">地图预览</div>
                    <div class="map-tools" aria-label="地图缩放">
                        <button class="map-tool-btn" id="zoomInButton" type="button" aria-label="放大地图">+</button>
                        <button class="map-tool-btn" id="zoomOutButton" type="button" aria-label="缩小地图">-</button>
                    </div>
                    <div class="map-tip">拖拽移动地图，滚轮缩放，点击图标定位到点位卡片</div>
                </div>

                <div class="card-grid" id="locationGrid"></div>
            </section>
        </main>
    </div>

    <script>
        const state = {
            metadata: null,
            categories: [],
            groups: [],
            locations: [],
            filtered: [],
            activeGroup: '',
            activeCategory: '',
            query: '',
        };

        const elements = {
            resultCount: document.getElementById('resultCount'),
            statLocations: document.getElementById('statLocations'),
            statCategories: document.getElementById('statCategories'),
            statGroups: document.getElementById('statGroups'),
            statUpdated: document.getElementById('statUpdated'),
            groupList: document.getElementById('groupList'),
            searchInput: document.getElementById('searchInput'),
            categorySelect: document.getElementById('categorySelect'),
            clearButton: document.getElementById('clearButton'),
            mapPreview: document.getElementById('mapPreview'),
            mapLayer: document.getElementById('mapLayer'),
            markerLayer: document.getElementById('markerLayer'),
            previewLabel: document.getElementById('previewLabel'),
            zoomInButton: document.getElementById('zoomInButton'),
            zoomOutButton: document.getElementById('zoomOutButton'),
            locationGrid: document.getElementById('locationGrid'),
        };

        const TILE_SIZE = 256;
        const mapView = {
            zoom: 11,
            center: { lng: -0.7, lat: 0.7 },
            minZoom: 9,
            maxZoom: 13,
            bounds: [-1.4, 0, 0, 1.4],
            dragging: null,
        };

        async function loadJson(path) {
            const response = await fetch(path);
            if (!response.ok) {
                throw new Error(`${path} 加载失败`);
            }
            return response.json();
        }

        function escapeHtml(value) {
            return String(value ?? '').replace(/[&<>"']/g, char => ({
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#39;',
            }[char]));
        }

        function formatNumber(value) {
            return Number(value || 0).toLocaleString('zh-CN');
        }

        function formatDate(value) {
            if (!value) return '-';
            const date = new Date(value);
            if (Number.isNaN(date.getTime())) return '-';
            return date.toLocaleDateString('zh-CN', {
                year: 'numeric',
                month: '2-digit',
                day: '2-digit',
            });
        }

        function buildCounts() {
            const groupCounts = new Map();
            const categoryCounts = new Map();
            state.locations.forEach(location => {
                const group = location.group_name || location.category_group_title || '未分组';
                const categoryId = String(location.category_id || '');
                groupCounts.set(group, (groupCounts.get(group) || 0) + 1);
                categoryCounts.set(categoryId, (categoryCounts.get(categoryId) || 0) + 1);
            });
            return { groupCounts, categoryCounts };
        }

        function renderStats() {
            elements.statLocations.textContent = formatNumber(state.locations.length);
            elements.statCategories.textContent = formatNumber(state.categories.length);
            elements.statGroups.textContent = formatNumber(state.groups.length);
            elements.statUpdated.textContent = formatDate(state.metadata?.fetched_at);
        }

        function renderGroups() {
            const { groupCounts } = buildCounts();
            const groupNames = Array.from(new Set([
                ...state.groups.map(group => group.title).filter(Boolean),
                ...state.locations.map(location => location.group_name || location.category_group_title).filter(Boolean),
            ]));

            const buttons = [
                `<button class="group-btn ${state.activeGroup ? '' : 'active'}" type="button" data-group="">
                    <span>全部分组</span>
                    <span class="group-count">${formatNumber(state.locations.length)}</span>
                </button>`,
                ...groupNames.map(name => `
                    <button class="group-btn ${state.activeGroup === name ? 'active' : ''}" type="button" data-group="${escapeHtml(name)}">
                        <span>${escapeHtml(name)}</span>
                        <span class="group-count">${formatNumber(groupCounts.get(name) || 0)}</span>
                    </button>
                `),
            ];
            elements.groupList.innerHTML = buttons.join('');
        }

        function renderCategories() {
            const { categoryCounts } = buildCounts();
            const selected = state.activeCategory;
            const categories = state.categories
                .slice()
                .sort((a, b) => String(a.group_title || '').localeCompare(String(b.group_title || ''), 'zh-CN') || String(a.title || '').localeCompare(String(b.title || ''), 'zh-CN'));

            elements.categorySelect.innerHTML = [
                '<option value="">全部分类</option>',
                ...categories.map(category => {
                    const id = String(category.id || '');
                    const label = `${category.group_title || '未分组'} / ${category.title || id} (${formatNumber(categoryCounts.get(id) || 0)})`;
                    return `<option value="${escapeHtml(id)}" ${selected === id ? 'selected' : ''}>${escapeHtml(label)}</option>`;
                }),
            ].join('');
        }

        function getSearchText(location) {
            const parts = [
                location.title,
                location.description,
                location.category_name,
                location.category_title,
                location.group_name,
                location.category_group_title,
                location.author?.nickName,
                location.latitude,
                location.longitude,
            ];
            return parts.filter(value => value !== undefined && value !== null).join(' ').toLowerCase();
        }

        function applyFilters() {
            const query = state.query.trim().toLowerCase();
            state.filtered = state.locations.filter(location => {
                const group = location.group_name || location.category_group_title || '';
                const categoryId = String(location.category_id || '');
                if (state.activeGroup && group !== state.activeGroup) return false;
                if (state.activeCategory && categoryId !== state.activeCategory) return false;
                if (query && !getSearchText(location).includes(query)) return false;
                return true;
            });

            renderGroups();
            renderCategories();
            renderPreview();
            renderLocations();
        }

        function tileBasePath() {
            const map = state.metadata?.map || {};
            const mapId = map.id || state.metadata?.map_id || 4010;
            const gameName = map.gameName || 'rocom';
            const version = map.version ? `${mapId}_${map.version}` : String(mapId);
            return `https://ue.17173cdn.com/a/terra/tiles/${gameName}/${version}`;
        }

        function project(lng, lat, zoom = mapView.zoom) {
            const scale = TILE_SIZE * 2 ** zoom;
            const sin = Math.sin((lat * Math.PI) / 180);
            return {
                x: ((lng + 180) / 360) * scale,
                y: (0.5 - Math.log((1 + sin) / (1 - sin)) / (4 * Math.PI)) * scale,
            };
        }

        function unproject(x, y, zoom = mapView.zoom) {
            const scale = TILE_SIZE * 2 ** zoom;
            const lng = (x / scale) * 360 - 180;
            const mercator = Math.PI - (2 * Math.PI * y) / scale;
            const lat = (180 / Math.PI) * Math.atan(0.5 * (Math.exp(mercator) - Math.exp(-mercator)));
            return { lng, lat };
        }

        function clampCenter(center) {
            const [west, south, east, north] = mapView.bounds;
            return {
                lng: Math.min(east, Math.max(west, center.lng)),
                lat: Math.min(north, Math.max(south, center.lat)),
            };
        }

        function viewportState() {
            const rect = elements.mapPreview.getBoundingClientRect();
            const centerPx = project(mapView.center.lng, mapView.center.lat);
            return {
                width: rect.width,
                height: rect.height,
                leftPx: centerPx.x - rect.width / 2,
                topPx: centerPx.y - rect.height / 2,
            };
        }

        function renderPreview() {
            updatePreviewLabel();
            renderTiles();
            renderMarkers();
        }

        function updatePreviewLabel() {
            elements.previewLabel.textContent = `地图预览：${formatNumber(state.filtered.length)} 个点位 / ${mapView.zoom}级`;
        }

        function renderTiles() {
            const { width, height, leftPx, topPx } = viewportState();
            const zoom = mapView.zoom;
            const maxTile = 2 ** zoom - 1;
            const minTileX = Math.max(0, Math.floor(leftPx / TILE_SIZE));
            const maxTileX = Math.min(maxTile, Math.floor((leftPx + width) / TILE_SIZE));
            const minTileY = Math.max(0, Math.floor(topPx / TILE_SIZE));
            const maxTileY = Math.min(maxTile, Math.floor((topPx + height) / TILE_SIZE));
            const base = tileBasePath();
            const fragment = document.createDocumentFragment();

            for (let x = minTileX; x <= maxTileX; x += 1) {
                for (let y = minTileY; y <= maxTileY; y += 1) {
                    const img = document.createElement('img');
                    img.className = 'map-tile';
                    img.alt = '';
                    img.draggable = false;
                    img.src = `${base}/${zoom}/${y}_${x}.png?v1`;
                    img.style.left = `${Math.round(x * TILE_SIZE - leftPx)}px`;
                    img.style.top = `${Math.round(y * TILE_SIZE - topPx)}px`;
                    fragment.appendChild(img);
                }
            }

            elements.mapLayer.replaceChildren(fragment);
        }

        function renderMarkers() {
            const { width, height, leftPx, topPx } = viewportState();
            const fragment = document.createDocumentFragment();
            const margin = 36;

            state.filtered.forEach(location => {
                if (!Number.isFinite(location.longitude) || !Number.isFinite(location.latitude)) return;
                const point = project(location.longitude, location.latitude);
                const left = point.x - leftPx;
                const top = point.y - topPx;
                if (left < -margin || left > width + margin || top < -margin || top > height + margin) return;

                const marker = document.createElement('button');
                marker.className = 'map-marker';
                marker.type = 'button';
                marker.style.left = `${left}px`;
                marker.style.top = `${top}px`;
                marker.title = `${location.title || '未命名点位'} / ${location.category_name || location.category_title || '未分类'}`;
                marker.innerHTML = location.category_icon
                    ? `<img src="${escapeHtml(location.category_icon)}" alt="">`
                    : '';
                marker.addEventListener('click', event => {
                    event.stopPropagation();
                    const card = document.getElementById(`location-${location.id}`);
                    if (card) {
                        card.scrollIntoView({ behavior: 'smooth', block: 'center' });
                        card.animate([
                            { transform: 'translateY(0)' },
                            { transform: 'translateY(-4px)' },
                            { transform: 'translateY(0)' },
                        ], { duration: 420, easing: 'ease-out' });
                    }
                });
                fragment.appendChild(marker);
            });

            elements.markerLayer.replaceChildren(fragment);
        }

        function rerenderMap() {
            updatePreviewLabel();
            renderTiles();
            renderMarkers();
        }

        function setZoom(nextZoom, anchorX = null, anchorY = null) {
            const oldZoom = mapView.zoom;
            const zoom = Math.min(mapView.maxZoom, Math.max(mapView.minZoom, nextZoom));
            if (zoom === oldZoom) return;

            const { width, height, leftPx, topPx } = viewportState();
            const focalX = anchorX ?? width / 2;
            const focalY = anchorY ?? height / 2;
            const focalLngLat = unproject(leftPx + focalX, topPx + focalY, oldZoom);
            mapView.zoom = zoom;

            const focalPx = project(focalLngLat.lng, focalLngLat.lat, zoom);
            const newCenterPx = {
                x: focalPx.x - focalX + width / 2,
                y: focalPx.y - focalY + height / 2,
            };
            mapView.center = clampCenter(unproject(newCenterPx.x, newCenterPx.y, zoom));
            rerenderMap();
        }

        function setupMapView() {
            const map = state.metadata?.map || {};
            if (Array.isArray(map.bounds) && map.bounds.length === 4) {
                mapView.bounds = map.bounds.map(Number);
            }
            mapView.minZoom = Number(map.minZoom || mapView.minZoom);
            mapView.maxZoom = Number(map.maxZoom || mapView.maxZoom);
            mapView.zoom = Number(map.initialZoom || mapView.zoom);

            const [west, south, east, north] = mapView.bounds;
            mapView.center = clampCenter({
                lng: (west + east) / 2,
                lat: (south + north) / 2,
            });
        }

        function renderLocations() {
            elements.resultCount.textContent = `当前显示 ${formatNumber(state.filtered.length)} / ${formatNumber(state.locations.length)} 个点位`;

            if (!state.filtered.length) {
                elements.locationGrid.innerHTML = '<div class="panel empty">没有找到符合条件的地图点位。</div>';
                return;
            }

            elements.locationGrid.innerHTML = state.filtered.map(location => {
                const title = location.title || '未命名点位';
                const category = location.category_name || location.category_title || '未分类';
                const group = location.group_name || location.category_group_title || '未分组';
                const description = location.description || '暂无文字说明';
                const image = location.image || (location.images && location.images[0]) || '';
                const icon = location.category_icon || '';
                const author = location.author?.nickName || '';
                const latitude = Number.isFinite(location.latitude) ? Number(location.latitude).toFixed(6) : '-';
                const longitude = Number.isFinite(location.longitude) ? Number(location.longitude).toFixed(6) : '-';
                return `
                    <article class="panel location-card" id="location-${escapeHtml(location.id)}">
                        ${image ? `<img class="location-image" src="${escapeHtml(image)}" alt="${escapeHtml(title)}" loading="lazy">` : `<div class="location-image"></div>`}
                        <div class="location-body">
                            <div class="location-top">
                                ${icon ? `<img class="category-icon" src="${escapeHtml(icon)}" alt="" loading="lazy">` : `<div class="category-icon"></div>`}
                                <div>
                                    <div class="location-title" title="${escapeHtml(title)}">${escapeHtml(title)}</div>
                                    <div class="location-meta">${escapeHtml(group)} / ${escapeHtml(category)}</div>
                                </div>
                            </div>
                            <div class="location-desc">${escapeHtml(description)}</div>
                            <div class="location-foot">
                                <span class="tag">经度 ${escapeHtml(longitude)}</span>
                                <span class="tag">纬度 ${escapeHtml(latitude)}</span>
                                ${author ? `<span class="tag">贡献者 ${escapeHtml(author)}</span>` : ''}
                            </div>
                        </div>
                    </article>
                `;
            }).join('');
        }

        async function init() {
            try {
                const [metadata, categoryData, locations] = await Promise.all([
                    loadJson('./map_data/metadata.json'),
                    loadJson('./map_data/categories.json'),
                    loadJson('./map_data/locations.json'),
                ]);
                state.metadata = metadata;
                state.categories = categoryData.categories || [];
                state.groups = categoryData.groups || [];
                state.locations = locations || [];
                state.filtered = state.locations.slice();
                setupMapView();
                renderStats();
                applyFilters();
            } catch (error) {
                elements.resultCount.textContent = '地图数据加载失败';
                elements.locationGrid.innerHTML = `<div class="panel empty">${escapeHtml(error.message || error)}</div>`;
            }
        }

        elements.groupList.addEventListener('click', event => {
            const button = event.target.closest('.group-btn');
            if (!button) return;
            state.activeGroup = button.dataset.group || '';
            applyFilters();
        });

        elements.searchInput.addEventListener('input', event => {
            state.query = event.target.value || '';
            applyFilters();
        });

        elements.categorySelect.addEventListener('change', event => {
            state.activeCategory = event.target.value || '';
            applyFilters();
        });

        elements.clearButton.addEventListener('click', () => {
            state.activeGroup = '';
            state.activeCategory = '';
            state.query = '';
            elements.searchInput.value = '';
            applyFilters();
        });

        elements.zoomInButton.addEventListener('click', event => {
            event.stopPropagation();
            setZoom(mapView.zoom + 1);
        });

        elements.zoomOutButton.addEventListener('click', event => {
            event.stopPropagation();
            setZoom(mapView.zoom - 1);
        });

        elements.mapPreview.addEventListener('wheel', event => {
            event.preventDefault();
            const rect = elements.mapPreview.getBoundingClientRect();
            const direction = event.deltaY < 0 ? 1 : -1;
            setZoom(mapView.zoom + direction, event.clientX - rect.left, event.clientY - rect.top);
        }, { passive: false });

        elements.mapPreview.addEventListener('pointerdown', event => {
            if (event.target.closest('.map-marker, .map-tool-btn')) return;
            const centerPx = project(mapView.center.lng, mapView.center.lat);
            mapView.dragging = {
                id: event.pointerId,
                x: event.clientX,
                y: event.clientY,
                centerPx,
            };
            elements.mapPreview.classList.add('is-dragging');
            elements.mapPreview.setPointerCapture(event.pointerId);
        });

        elements.mapPreview.addEventListener('pointermove', event => {
            const drag = mapView.dragging;
            if (!drag || drag.id !== event.pointerId) return;
            const dx = event.clientX - drag.x;
            const dy = event.clientY - drag.y;
            mapView.center = clampCenter(unproject(drag.centerPx.x - dx, drag.centerPx.y - dy));
            rerenderMap();
        });

        function endMapDrag(event) {
            const drag = mapView.dragging;
            if (!drag || drag.id !== event.pointerId) return;
            mapView.dragging = null;
            elements.mapPreview.classList.remove('is-dragging');
            if (elements.mapPreview.hasPointerCapture(event.pointerId)) {
                elements.mapPreview.releasePointerCapture(event.pointerId);
            }
        }

        elements.mapPreview.addEventListener('pointerup', endMapDrag);
        elements.mapPreview.addEventListener('pointercancel', endMapDrag);
        window.addEventListener('resize', rerenderMap);

        init();
    </script>
</body>
</html>
