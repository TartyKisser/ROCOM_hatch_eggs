<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>技能图鉴 - 洛克王国世界工具站</title>
    <style>
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --secondary: #ec4899;
            --text: #1e293b;
            --text-secondary: #64748b;
            --border: rgba(226,232,240,0.9);
            --panel: rgba(255,255,255,0.92);
            --panel-soft: rgba(248,250,252,0.86);
            --shadow: 0 18px 45px rgba(15, 23, 42, 0.18);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            padding: 20px;
            font-family: 'Segoe UI', system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
            color: var(--text);
            background: url('./web_images/bg.jpg') no-repeat center center fixed,
                        linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            background-size: cover;
        }

        .container {
            width: 96%;
            max-width: 1500px;
            margin: 0 auto;
        }

        header {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            padding: 42px 20px 28px;
            color: white;
        }

        .hero-eyebrow {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 6px 12px;
            margin-bottom: 16px;
            border: 1px solid rgba(255,255,255,0.32);
            border-radius: 999px;
            background: rgba(15,23,42,0.22);
            color: rgba(255,255,255,0.9);
            font-size: 0.78rem;
            font-weight: 800;
            letter-spacing: 0.08em;
        }

        .main-title {
            font-size: 2.6rem;
            line-height: 1.12;
            margin-bottom: 10px;
            font-weight: 900;
            text-shadow: 0 4px 18px rgba(15,23,42,0.45);
        }

        .desc-font {
            font-size: 1.05rem;
            color: rgba(255,255,255,0.94);
            text-shadow: 0 2px 8px rgba(15,23,42,0.28);
        }

        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 16px;
            margin-bottom: 18px;
        }

        .topbar-actions {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            min-height: 42px;
            padding: 10px 16px;
            border: 1px solid rgba(255,255,255,0.48);
            border-radius: 12px;
            background: rgba(255,255,255,0.9);
            color: var(--primary-dark);
            font-size: 0.95rem;
            font-weight: 800;
            text-decoration: none;
            cursor: pointer;
            box-shadow: 0 8px 22px rgba(15,23,42,0.12);
            transition: transform 0.2s ease, border-color 0.2s ease;
        }

        .btn:hover {
            transform: translateY(-2px);
            border-color: rgba(99,102,241,0.48);
        }

        .count-pill {
            display: inline-flex;
            align-items: center;
            min-height: 36px;
            padding: 8px 12px;
            border-radius: 999px;
            background: rgba(255,255,255,0.84);
            color: var(--text-secondary);
            font-size: 0.9rem;
            font-weight: 700;
        }

        .panel {
            background: var(--panel);
            border: 1px solid rgba(255,255,255,0.55);
            border-radius: 18px;
            box-shadow: var(--shadow);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }

        .controls {
            padding: 18px;
            margin-bottom: 18px;
        }

        .mode-tabs {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 8px;
            margin-bottom: 14px;
        }

        .mode-tab {
            min-height: 42px;
            padding: 9px 12px;
            border: 1px solid rgba(99,102,241,0.16);
            border-radius: 12px;
            background: rgba(99,102,241,0.08);
            color: var(--primary-dark);
            font: inherit;
            font-size: 0.92rem;
            font-weight: 900;
            cursor: pointer;
        }

        .mode-tab.active {
            color: white;
            border-color: transparent;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            box-shadow: 0 10px 24px rgba(99,102,241,0.22);
        }

        .control-panel {
            display: none;
        }

        .control-panel.active {
            display: block;
        }

        .search-row {
            display: grid;
            grid-template-columns: minmax(0, 1fr) auto;
            gap: 12px;
            align-items: center;
        }

        .search-input {
            width: 100%;
            min-height: 46px;
            padding: 13px 15px;
            border: 2px solid var(--border);
            border-radius: 13px;
            font-size: 1rem;
            color: var(--text);
            background: rgba(255,255,255,0.94);
            outline: none;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
        }

        .search-input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(99,102,241,0.12);
        }

        .filters,
        .pet-matches {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 12px;
        }

        .filter-chip,
        .type-chip,
        .pet-match-chip {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            min-height: 28px;
            padding: 5px 9px;
            border: 1px solid rgba(99,102,241,0.16);
            border-radius: 999px;
            background: rgba(99,102,241,0.08);
            color: var(--primary-dark);
            font-size: 0.82rem;
            font-weight: 800;
        }

        .filter-chip,
        .pet-match-chip {
            cursor: pointer;
        }

        .filter-chip.active {
            color: white;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-color: transparent;
        }

        .type-logo {
            width: 18px;
            height: 18px;
            object-fit: contain;
            flex: 0 0 auto;
        }

        .view {
            display: none;
        }

        .view.active {
            display: block;
        }

        .skill-section {
            margin-bottom: 18px;
            overflow: hidden;
        }

        .section-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            padding: 16px 18px;
            border-bottom: 1px solid rgba(226,232,240,0.86);
            background:
                linear-gradient(90deg, rgba(var(--type-rgb, 99,102,241),0.16), rgba(255,255,255,0.48));
        }

        .section-title {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: var(--primary-dark);
            font-size: 1.15rem;
            font-weight: 950;
        }

        .section-count {
            color: var(--text-secondary);
            font-size: 0.86rem;
            font-weight: 850;
        }

        .skill-card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 12px;
            padding: 16px;
        }

        .skill-card {
            --skill-accent-rgb: 99,102,241;
            --skill-secondary-rgb: 236,72,153;
            --skill-text: var(--primary-dark);
            display: grid;
            grid-template-columns: 62px minmax(0, 1fr);
            gap: 12px;
            min-height: 120px;
            padding: 12px;
            border: 1px solid rgba(var(--skill-accent-rgb),0.24);
            border-radius: 14px;
            background:
                linear-gradient(180deg, rgba(255,255,255,0.92), rgba(255,255,255,0.76)),
                radial-gradient(circle at top right, rgba(var(--skill-accent-rgb),0.22), transparent 48%),
                linear-gradient(135deg, rgba(var(--skill-accent-rgb),0.12), rgba(var(--skill-secondary-rgb),0.1));
            box-shadow: inset 4px 0 0 rgba(var(--skill-accent-rgb),0.54);
            text-align: left;
            cursor: pointer;
            transition: transform 0.18s ease, box-shadow 0.18s ease, border-color 0.18s ease;
        }

        .skill-card:hover {
            transform: translateY(-4px);
            border-color: rgba(var(--skill-accent-rgb),0.42);
            box-shadow: 0 18px 36px rgba(15,23,42,0.18), inset 4px 0 0 rgba(var(--skill-accent-rgb),0.68);
        }

        .skill-icon-wrap {
            width: 62px;
            height: 62px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 14px;
            background: rgba(255,255,255,0.68);
            border: 1px solid rgba(var(--skill-accent-rgb),0.18);
        }

        .skill-icon {
            width: 48px;
            height: 48px;
            object-fit: contain;
        }

        .skill-main {
            min-width: 0;
        }

        .skill-name-row {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 8px;
            margin-bottom: 6px;
        }

        .skill-name {
            color: var(--text);
            font-size: 1rem;
            font-weight: 950;
            line-height: 1.35;
        }

        .skill-user-count {
            flex: 0 0 auto;
            color: var(--skill-text);
            font-size: 0.78rem;
            font-weight: 950;
        }

        .skill-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
            margin-bottom: 7px;
        }

        .skill-chip {
            display: inline-flex;
            align-items: center;
            min-height: 22px;
            padding: 3px 7px;
            border-radius: 999px;
            background: rgba(99,102,241,0.09);
            color: var(--primary-dark);
            font-size: 0.75rem;
            font-weight: 900;
        }

        .skill-desc,
        .muted-copy {
            color: var(--text-secondary);
            line-height: 1.65;
        }

        .skill-desc {
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            font-size: 0.88rem;
        }

        .empty-state {
            padding: 34px 16px;
            text-align: center;
            color: var(--text-secondary);
            font-weight: 700;
        }

        .detail {
            overflow: hidden;
        }

        .detail-hero {
            min-height: 300px;
            padding: 28px;
            display: grid;
            grid-template-columns: minmax(180px, 280px) minmax(0, 1fr);
            gap: 28px;
            align-items: center;
            color: white;
            background:
                linear-gradient(135deg, rgba(var(--type-rgb, 99,102,241),0.95), rgba(var(--type-rgb-b, 236,72,153),0.76)),
                radial-gradient(circle at top right, rgba(255,255,255,0.22), transparent 42%);
        }

        .detail-icon-wrap {
            min-height: 220px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 18px;
            background:
                radial-gradient(circle at 50% 45%, rgba(255,255,255,0.74), rgba(255,255,255,0.2) 46%, rgba(255,255,255,0.06) 70%);
        }

        .detail-icon {
            width: min(168px, 76%);
            aspect-ratio: 1;
            object-fit: contain;
            filter: drop-shadow(0 18px 24px rgba(15,23,42,0.28));
        }

        .detail-header-row {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 12px;
        }

        .detail-number {
            display: inline-flex;
            padding: 6px 11px;
            border-radius: 999px;
            background: rgba(255,255,255,0.18);
            font-size: 0.92rem;
            font-weight: 900;
        }

        .detail-title {
            font-size: clamp(2rem, 4vw, 3.3rem);
            line-height: 1.08;
            margin-bottom: 12px;
            font-weight: 900;
            text-shadow: 0 4px 18px rgba(15,23,42,0.28);
        }

        .type-row {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 16px;
        }

        .detail-hero .type-chip {
            color: white;
            background: rgba(255,255,255,0.2);
            border-color: rgba(255,255,255,0.24);
        }

        .detail-body {
            padding: 22px;
            display: grid;
            gap: 18px;
        }

        .info-grid {
            display: grid;
            grid-template-columns: repeat(4, minmax(0, 1fr));
            gap: 12px;
        }

        .info-tile,
        .detail-section {
            border: 1px solid var(--border);
            border-radius: 16px;
            background: var(--panel-soft);
        }

        .info-tile {
            padding: 14px;
        }

        .info-label {
            color: var(--text-secondary);
            font-size: 0.82rem;
            font-weight: 800;
            margin-bottom: 6px;
        }

        .info-value {
            font-size: 1rem;
            font-weight: 900;
        }

        .detail-section {
            padding: 18px;
        }

        .detail-section-title {
            font-size: 1.12rem;
            color: var(--primary-dark);
            margin-bottom: 14px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .detail-section-title::before {
            content: '';
            width: 4px;
            height: 22px;
            background: var(--primary);
            border-radius: 2px;
        }

        .acquire-list,
        .pet-grid {
            display: grid;
            gap: 10px;
        }

        .acquire-item {
            padding: 11px 12px;
            border: 1px solid rgba(226,232,240,0.86);
            border-radius: 13px;
            background: rgba(255,255,255,0.72);
        }

        .acquire-title {
            color: var(--primary-dark);
            font-weight: 950;
            line-height: 1.45;
        }

        .acquire-text {
            margin-top: 3px;
            color: var(--text-secondary);
            font-size: 0.9rem;
            line-height: 1.6;
        }

        .acquire-title-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
        }

        .acquire-pet-strip {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 10px;
            overflow: hidden;
        }

        .acquire-pet-strip.is-collapsed {
            max-height: 46px;
        }

        .acquire-pet-avatar {
            width: 42px;
            height: 42px;
            flex: 0 0 auto;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border: 1px solid rgba(226,232,240,0.9);
            border-radius: 11px;
            background: rgba(255,255,255,0.82);
        }

        .acquire-pet-avatar img {
            width: 38px;
            height: 38px;
            object-fit: contain;
            filter: drop-shadow(0 6px 8px rgba(15,23,42,0.14));
        }

        .acquire-toggle {
            width: 30px;
            height: 30px;
            flex: 0 0 auto;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border: 1px solid rgba(99,102,241,0.18);
            border-radius: 999px;
            background: rgba(99,102,241,0.08);
            color: var(--primary-dark);
            font-size: 1rem;
            font-weight: 950;
            cursor: pointer;
            transition: transform 0.16s ease, background 0.16s ease;
        }

        .acquire-toggle:hover {
            background: rgba(99,102,241,0.14);
            transform: translateY(-1px);
        }

        .acquire-toggle.is-open {
            transform: rotate(180deg);
        }

        .acquire-toggle.is-hidden {
            display: none;
        }

        .research-task-list {
            display: grid;
            gap: 8px;
            margin-top: 10px;
        }

        .research-task-row {
            display: grid;
            grid-template-columns: 46px minmax(0, 1fr);
            gap: 10px;
            align-items: center;
            padding: 8px;
            border: 1px solid rgba(226,232,240,0.78);
            border-radius: 12px;
            background: rgba(255,255,255,0.64);
        }

        .research-task-image {
            width: 46px;
            height: 46px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 11px;
            background: rgba(255,255,255,0.78);
        }

        .research-task-image img {
            width: 42px;
            height: 42px;
            object-fit: contain;
            filter: drop-shadow(0 6px 8px rgba(15,23,42,0.12));
        }

        .research-task-pet {
            color: var(--primary-dark);
            font-weight: 950;
            line-height: 1.35;
        }

        .research-task-text {
            color: var(--text-secondary);
            font-size: 0.9rem;
            line-height: 1.55;
        }

        .pet-grid {
            grid-template-columns: repeat(auto-fill, minmax(190px, 1fr));
        }

        .pet-card {
            display: grid;
            grid-template-columns: 54px minmax(0, 1fr);
            gap: 10px;
            align-items: center;
            padding: 10px;
            border: 1px solid rgba(226,232,240,0.86);
            border-radius: 14px;
            background:
                linear-gradient(180deg, rgba(255,255,255,0.92), rgba(255,255,255,0.72)),
                linear-gradient(135deg, rgba(var(--type-rgb, 99,102,241),0.16), rgba(var(--type-rgb-b, 236,72,153),0.12));
        }

        .pet-image-wrap {
            width: 54px;
            height: 54px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
            background: rgba(255,255,255,0.74);
        }

        .pet-image {
            width: 48px;
            height: 48px;
            object-fit: contain;
            filter: drop-shadow(0 7px 10px rgba(15,23,42,0.14));
        }

        .pet-number {
            color: var(--text-secondary);
            font-size: 0.74rem;
            font-weight: 900;
        }

        .pet-name {
            overflow: hidden;
            color: var(--text);
            font-weight: 950;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .pet-skill-source {
            overflow: hidden;
            color: var(--primary-dark);
            font-size: 0.78rem;
            font-weight: 850;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .footer-beian {
            text-align: center;
            margin-top: 40px;
            padding-bottom: 20px;
            font-size: 13px;
        }

        .footer-beian a {
            color: rgba(255,255,255,0.8);
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 5px;
            transition: color 0.3s;
        }

        .footer-beian a:hover {
            color: #ffffff;
        }

        .back-to-top {
            position: fixed;
            right: 20px;
            bottom: 20px;
            z-index: 20;
            width: 44px;
            height: 44px;
            border: 1px solid rgba(255,255,255,0.55);
            border-radius: 999px;
            background: rgba(255,255,255,0.88);
            color: var(--primary-dark);
            font-size: 1.2rem;
            font-weight: 950;
            box-shadow: 0 12px 28px rgba(15,23,42,0.2);
            cursor: pointer;
            opacity: 0;
            visibility: hidden;
            transform: translateY(8px);
            transition: opacity 0.18s ease, transform 0.18s ease, visibility 0.18s ease;
        }

        .back-to-top.visible {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
        }

        @media (max-width: 900px) {
            body {
                padding: 14px;
            }

            .topbar {
                align-items: stretch;
                flex-direction: column;
            }

            .topbar-actions {
                justify-content: flex-start;
            }

            .mode-tabs,
            .detail-hero,
            .info-grid {
                grid-template-columns: 1fr;
            }

            .detail-hero {
                padding: 20px;
            }

            .detail-icon-wrap {
                min-height: 170px;
            }

            .search-row {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 560px) {
            .container {
                width: 100%;
            }

            header {
                padding-top: 26px;
            }

            .main-title {
                font-size: 2rem;
            }

            .skill-card-grid,
            .pet-grid {
                grid-template-columns: 1fr;
            }

            .skill-card {
                grid-template-columns: 56px minmax(0, 1fr);
            }

            .skill-icon-wrap {
                width: 56px;
                height: 56px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="hero-eyebrow">SKILLS</div>
            <h1 class="main-title">技能图鉴</h1>
            <p class="desc-font">按系别浏览技能，查看技能资料、获得方式与可使用精灵。</p>
        </header>

        <div class="topbar">
            <a id="homeLink" class="btn" href="index.html">‹ 返回主页</a>
            <button id="backToGallery" class="btn" type="button" style="display:none;">‹ 返回技能图鉴</button>
            <div class="topbar-actions">
                <div class="count-pill" id="resultCount">数据加载中</div>
            </div>
        </div>

        <main id="galleryView" class="view active">
            <section class="panel controls">
                <div class="mode-tabs" role="tablist" aria-label="技能图鉴筛选方式">
                    <button class="mode-tab active" type="button" data-mode="skill">技能名称</button>
                    <button class="mode-tab" type="button" data-mode="type">系别筛选</button>
                    <button class="mode-tab" type="button" data-mode="pet">精灵名称</button>
                </div>

                <div id="skillModePanel" class="control-panel active">
                    <div class="search-row">
                        <input id="skillSearchInput" class="search-input" type="search" placeholder="搜索技能名称..." autocomplete="off">
                        <button id="clearSkillSearch" class="btn" type="button">清空</button>
                    </div>
                </div>

                <div id="typeModePanel" class="control-panel">
                    <div id="typeFilters" class="filters"></div>
                </div>

                <div id="petModePanel" class="control-panel">
                    <div class="search-row">
                        <input id="petSearchInput" class="search-input" type="search" placeholder="搜索精灵名称..." autocomplete="off">
                        <button id="clearPetSearch" class="btn" type="button">清空</button>
                    </div>
                    <div id="petMatches" class="pet-matches"></div>
                </div>
            </section>

            <section id="skillList">
                <div class="panel empty-state">正在加载技能数据...</div>
            </section>
        </main>

        <main id="detailView" class="view">
            <section id="detailPanel" class="panel detail">
                <div class="empty-state">请选择一个技能查看详情。</div>
            </section>
        </main>
    </div>

    <div class="footer-beian">
        <a href="https://beian.mps.gov.cn/#/query/webSearch?code=32058102002843" rel="noreferrer" target="_blank">
            <img src="https://img.alicdn.com/tfs/TB1..50QpXXXXX7XpXXXXXXXXXX-40-40.png" alt="" style="width: 20px; height: 20px;">
            苏公网安备32058102002843号
        </a>
    </div>

    <button id="backToTop" class="back-to-top" type="button" aria-label="回到顶部">↑</button>

    <script>
        const ATTRIBUTES = ['普通', '草', '火', '水', '光', '地', '冰', '龙', '电', '毒', '虫', '武', '翼', '萌', '幽', '恶', '机械', '幻'];
        const ATTRIBUTE_LOGOS = Object.fromEntries(
            ATTRIBUTES.map(attr => [attr, `./web_images/types/${attr}.png`])
        );
        const ATTRIBUTE_COLORS = {
            '普通': '#3F89B4',
            '草': '#4EBC73',
            '火': '#DB5525',
            '水': '#6AA9FE',
            '光': '#4FC0FF',
            '地': '#9A7E3F',
            '冰': '#5FADDD',
            '龙': '#ED4962',
            '电': '#E7C506',
            '毒': '#BA62E0',
            '虫': '#9ECE21',
            '武': '#FF9636',
            '翼': '#3EC7CA',
            '萌': '#FC7CAC',
            '幽': '#9446EC',
            '恶': '#CF467A',
            '机械': '#40CBA9',
            '幻': '#9FA7F8',
            '无系别': '#64748b'
        };
        const FALLBACK_TYPE = '无系别';
        const FALLBACK_ATTRIBUTE_COLOR = '#6366f1';

        let records = [];
        let skills = [];
        let skillByName = new Map();
        let filteredSkills = [];
        let activeMode = 'skill';
        let activeType = '';
        let selectedSkillName = '';
        let matchedPets = [];
        let galleryScrollY = 0;

        const homeLink = document.getElementById('homeLink');
        const backToGallery = document.getElementById('backToGallery');
        const resultCount = document.getElementById('resultCount');
        const galleryView = document.getElementById('galleryView');
        const detailView = document.getElementById('detailView');
        const skillList = document.getElementById('skillList');
        const detailPanel = document.getElementById('detailPanel');
        const skillSearchInput = document.getElementById('skillSearchInput');
        const clearSkillSearch = document.getElementById('clearSkillSearch');
        const petSearchInput = document.getElementById('petSearchInput');
        const clearPetSearch = document.getElementById('clearPetSearch');
        const typeFilters = document.getElementById('typeFilters');
        const petMatches = document.getElementById('petMatches');
        const backToTop = document.getElementById('backToTop');

        function escapeHtml(value) {
            return String(value ?? '').replace(/[&<>"']/g, char => ({
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#39;'
            }[char]));
        }

        function normalize(value) {
            return String(value || '').replace(/\s+/g, '').toLowerCase();
        }

        function displayValue(value) {
            return value === undefined || value === null || value === '' ? '暂无' : value;
        }

        function safeFileName(value) {
            return String(value || 'unknown-skill').replace(/[<>:"\\/|?*\x00-\x1f]/g, '_');
        }

        function typeName(value) {
            return value || FALLBACK_TYPE;
        }

        function hexToRgb(hex) {
            const normalizedHex = String(hex || FALLBACK_ATTRIBUTE_COLOR).replace('#', '');
            const value = normalizedHex.length === 3
                ? normalizedHex.split('').map(char => char + char).join('')
                : normalizedHex.padEnd(6, '0').slice(0, 6);
            return `${parseInt(value.slice(0, 2), 16)},${parseInt(value.slice(2, 4), 16)},${parseInt(value.slice(4, 6), 16)}`;
        }

        function typeRgb(attr) {
            return hexToRgb(ATTRIBUTE_COLORS[typeName(attr)] || FALLBACK_ATTRIBUTE_COLOR);
        }

        function secondaryTypeRgb(attr) {
            const index = ATTRIBUTES.indexOf(attr);
            const next = index >= 0 ? ATTRIBUTES[(index + 5) % ATTRIBUTES.length] : '幻';
            return typeRgb(next);
        }

        function skillStyle(skill) {
            return `--skill-accent-rgb: ${typeRgb(skill.type)}; --skill-secondary-rgb: ${secondaryTypeRgb(skill.type)}; --skill-text: ${ATTRIBUTE_COLORS[typeName(skill.type)] || FALLBACK_ATTRIBUTE_COLOR};`;
        }

        function sectionStyle(attr) {
            return `--type-rgb: ${typeRgb(attr)};`;
        }

        function detailStyle(skill) {
            return `--type-rgb: ${typeRgb(skill.type)}; --type-rgb-b: ${secondaryTypeRgb(skill.type)};`;
        }

        function recordAttributes(record) {
            return Array.isArray(record.attributes) && record.attributes.length ? record.attributes : ['普通'];
        }

        function portraitSmallPath(record) {
            return String(record && record.portrait ? record.portrait : '').replace('/portrait/', '/portrait-small/');
        }

        function recordBackgroundStyle(record) {
            const attrs = recordAttributes(record);
            return `--type-rgb: ${typeRgb(attrs[0])}; --type-rgb-b: ${typeRgb(attrs[1] || attrs[0])};`;
        }

        function renderAttributeLogo(attr) {
            const logo = ATTRIBUTE_LOGOS[attr] || '';
            return logo
                ? `<img class="type-logo" src="${escapeHtml(logo)}" alt="" aria-hidden="true" onerror="this.style.display='none'">`
                : '';
        }

        function renderAttributeChip(attr) {
            const label = typeName(attr);
            return `<span class="type-chip">${renderAttributeLogo(label)}<span>${escapeHtml(label)}</span></span>`;
        }

        function skillIconPath(skill) {
            if (skill && skill.icon) return skill.icon;
            return `skills/${safeFileName(skill && skill.name)}.png`;
        }

        function mostCommon(values) {
            const counts = new Map();
            values.filter(Boolean).forEach(value => counts.set(value, (counts.get(value) || 0) + 1));
            return [...counts.entries()].sort((a, b) => b[1] - a[1] || a[0].localeCompare(b[0], 'zh-CN'))[0]?.[0] || '';
        }

        function buildSkillIndex() {
            const map = new Map();

            records.forEach(record => {
                const recordSkills = Array.isArray(record.skills) ? record.skills : [];
                recordSkills.forEach(skill => {
                    if (!skill || !skill.name) return;
                    if (!map.has(skill.name)) {
                        map.set(skill.name, {
                            name: skill.name,
                            type: '',
                            category: '',
                            cost: '',
                            power: '',
                            description: '',
                            icon: '',
                            iconExists: false,
                            variants: [],
                            users: [],
                            userMap: new Map(),
                            researchTasks: []
                        });
                    }

                    const entry = map.get(skill.name);
                    entry.variants.push({ record, skill });
                    if (!entry.userMap.has(record.id)) {
                        entry.userMap.set(record.id, { record, skills: [] });
                    }
                    entry.userMap.get(record.id).skills.push(skill);
                    if (skill.iconExists && skill.icon && !entry.icon) {
                        entry.icon = skill.icon;
                    }
                    if (skill.iconExists) {
                        entry.iconExists = true;
                    }
                });
            });

            map.forEach(entry => {
                records.forEach(record => {
                    const tasks = record.research && Array.isArray(record.research.tasks) ? record.research.tasks : [];
                    tasks.forEach(task => {
                        const taskName = task && task.name ? task.name : '';
                        if (taskName && normalize(taskName).includes(normalize(entry.name))) {
                            entry.researchTasks.push({ record, taskName });
                        }
                    });
                });

                const variantSkills = entry.variants.map(item => item.skill);
                entry.type = mostCommon(variantSkills.map(skill => skill.type)) || FALLBACK_TYPE;
                entry.category = mostCommon(variantSkills.map(skill => skill.category));
                entry.cost = mostCommon(variantSkills.map(skill => skill.cost));
                entry.power = mostCommon(variantSkills.map(skill => skill.power));
                entry.description = variantSkills
                    .map(skill => skill.description || '')
                    .sort((a, b) => b.length - a.length)[0] || '';
                entry.icon = entry.icon || variantSkills.find(skill => skill.icon)?.icon || `skills/${safeFileName(entry.name)}.png`;
                entry.users = [...entry.userMap.values()]
                    .map(item => ({ ...item, primarySkill: item.skills[0] }))
                    .sort((a, b) => {
                        const numberCompare = String(a.record.number || '').localeCompare(String(b.record.number || ''), 'zh-CN', { numeric: true });
                        return numberCompare || String(a.record.title || '').localeCompare(String(b.record.title || ''), 'zh-CN');
                    });
                entry.searchText = normalize([
                    entry.name,
                    entry.type,
                    entry.category,
                    entry.description,
                    ...entry.users.map(user => `${user.record.number}${user.record.title}${user.record.id}`)
                ].join(' '));
                delete entry.userMap;
            });

            skills = [...map.values()].sort(compareSkills);
            skillByName = map;
            filteredSkills = skills;
        }

        function compareSkills(a, b) {
            const typeCompare = typeOrder(a.type) - typeOrder(b.type);
            return typeCompare || a.name.localeCompare(b.name, 'zh-CN');
        }

        function typeOrder(attr) {
            const index = ATTRIBUTES.indexOf(attr);
            return index === -1 ? ATTRIBUTES.length : index;
        }

        function renderTypeFilters() {
            typeFilters.innerHTML = [
                `<button class="filter-chip ${activeType === '' ? 'active' : ''}" type="button" data-type="">全部</button>`,
                ...ATTRIBUTES.map(attr => (
                    `<button class="filter-chip ${activeType === attr ? 'active' : ''}" type="button" data-type="${escapeHtml(attr)}">${renderAttributeLogo(attr)}<span>${escapeHtml(attr)}</span></button>`
                )),
                `<button class="filter-chip ${activeType === FALLBACK_TYPE ? 'active' : ''}" type="button" data-type="${FALLBACK_TYPE}">${FALLBACK_TYPE}</button>`
            ].join('');

            typeFilters.querySelectorAll('.filter-chip').forEach(button => {
                button.addEventListener('click', () => {
                    activeType = button.dataset.type || '';
                    applyFilters();
                });
            });
        }

        function renderModePanels() {
            document.querySelectorAll('.mode-tab').forEach(button => {
                button.classList.toggle('active', button.dataset.mode === activeMode);
            });
            document.getElementById('skillModePanel').classList.toggle('active', activeMode === 'skill');
            document.getElementById('typeModePanel').classList.toggle('active', activeMode === 'type');
            document.getElementById('petModePanel').classList.toggle('active', activeMode === 'pet');
        }

        function applyFilters() {
            renderModePanels();
            matchedPets = [];

            if (activeMode === 'skill') {
                const keyword = normalize(skillSearchInput.value);
                filteredSkills = skills.filter(skill => !keyword || skill.searchText.includes(keyword));
            } else if (activeMode === 'type') {
                filteredSkills = skills.filter(skill => !activeType || typeName(skill.type) === activeType);
            } else {
                const keyword = normalize(petSearchInput.value);
                if (!keyword) {
                    filteredSkills = [];
                } else {
                    matchedPets = records.filter(record => {
                        const text = normalize([record.id, record.number, record.title, record.searchText].join(' '));
                        return text.includes(keyword);
                    });
                    const skillNames = [];
                    const seenSkillNames = new Set();
                    matchedPets.forEach(record => {
                        (Array.isArray(record.skills) ? record.skills : []).forEach(skill => {
                            if (skill && skill.name && !seenSkillNames.has(skill.name)) {
                                seenSkillNames.add(skill.name);
                                skillNames.push(skill.name);
                            }
                        });
                    });
                    filteredSkills = skillNames.map(name => skillByName.get(name)).filter(Boolean);
                }
            }

            renderTypeFilters();
            renderPetMatches();
            renderSkillList();
        }

        function renderPetMatches() {
            if (activeMode !== 'pet' || !petSearchInput.value.trim()) {
                petMatches.innerHTML = '';
                return;
            }

            if (!matchedPets.length) {
                petMatches.innerHTML = '<span class="pet-match-chip">没有匹配的精灵</span>';
                return;
            }

            petMatches.innerHTML = matchedPets.slice(0, 18).map(record => `
                <button class="pet-match-chip" type="button" data-pet-name="${escapeHtml(record.title)}">
                    NO.${escapeHtml(record.number)} ${escapeHtml(record.title)}
                </button>
            `).join('') + (matchedPets.length > 18 ? `<span class="pet-match-chip">另有 ${matchedPets.length - 18} 只</span>` : '');

            petMatches.querySelectorAll('button.pet-match-chip').forEach(button => {
                button.addEventListener('click', () => {
                    petSearchInput.value = button.dataset.petName || '';
                    applyFilters();
                });
            });
        }

        function renderSkillCard(skill) {
            const meta = [
                typeName(skill.type),
                skill.category,
                skill.cost ? `耗能 ${skill.cost}` : '',
                skill.power && skill.power !== '0' ? `威力 ${skill.power}` : ''
            ].filter(Boolean);

            return `
                <button class="skill-card" type="button" data-skill-name="${escapeHtml(skill.name)}" style="${skillStyle(skill)}">
                    <div class="skill-icon-wrap">
                        <img class="skill-icon" src="${escapeHtml(skillIconPath(skill))}" alt="${escapeHtml(skill.name)}" loading="lazy" onerror="this.style.display='none'">
                    </div>
                    <div class="skill-main">
                        <div class="skill-name-row">
                            <div class="skill-name">${escapeHtml(skill.name)}</div>
                            <div class="skill-user-count">${skill.users.length}只</div>
                        </div>
                        <div class="skill-meta">${meta.map(item => `<span class="skill-chip">${escapeHtml(item)}</span>`).join('')}</div>
                        <div class="skill-desc">${escapeHtml(skill.description || '暂无描述')}</div>
                    </div>
                </button>
            `;
        }

        function renderSkillList() {
            if (activeMode === 'pet' && !petSearchInput.value.trim()) {
                resultCount.textContent = `共 ${skills.length} 个技能`;
                skillList.innerHTML = '<div class="panel empty-state">输入精灵名称后显示它能使用的技能。</div>';
                return;
            }

            resultCount.textContent = `共 ${filteredSkills.length} / ${skills.length} 个技能`;

            if (!filteredSkills.length) {
                skillList.innerHTML = '<div class="panel empty-state">没有匹配的技能。</div>';
                return;
            }

            if (activeMode === 'pet') {
                skillList.innerHTML = `
                    <section class="panel skill-section">
                        <div class="section-head">
                            <h2 class="section-title"><span>可用技能</span></h2>
                            <div class="section-count">${filteredSkills.length} 个技能</div>
                        </div>
                        <div class="skill-card-grid">
                            ${filteredSkills.map(renderSkillCard).join('')}
                        </div>
                    </section>
                `;

                skillList.querySelectorAll('.skill-card').forEach(card => {
                    card.addEventListener('click', () => showDetail(card.dataset.skillName));
                });
                return;
            }

            const groups = new Map();
            filteredSkills.forEach(skill => {
                const group = typeName(skill.type);
                if (!groups.has(group)) groups.set(group, []);
                groups.get(group).push(skill);
            });

            skillList.innerHTML = [...groups.entries()]
                .sort((a, b) => typeOrder(a[0]) - typeOrder(b[0]))
                .map(([attr, groupSkills]) => `
                    <section class="panel skill-section" style="${sectionStyle(attr)}">
                        <div class="section-head">
                            <h2 class="section-title">${renderAttributeLogo(attr)}<span>${escapeHtml(attr)}</span></h2>
                            <div class="section-count">${groupSkills.length} 个技能</div>
                        </div>
                        <div class="skill-card-grid">
                            ${groupSkills.map(renderSkillCard).join('')}
                        </div>
                    </section>
                `).join('');

            skillList.querySelectorAll('.skill-card').forEach(card => {
                card.addEventListener('click', () => showDetail(card.dataset.skillName));
            });
        }

        function sourceLabel(skill) {
            const chunks = [
                skill.source || '',
                skill.unlock || skill.level || ''
            ].filter(Boolean);
            return chunks.length ? chunks.join(' / ') : '暂无';
        }

        function uniqueRecords(records) {
            const seen = new Set();
            return records.filter(record => {
                if (!record || seen.has(record.id)) return false;
                seen.add(record.id);
                return true;
            });
        }

        function renderPetAvatar(record) {
            return `
                <span class="acquire-pet-avatar" title="NO.${escapeHtml(record.number)} ${escapeHtml(record.title)}">
                    <img src="${escapeHtml(portraitSmallPath(record))}" alt="${escapeHtml(record.title)}" loading="lazy" onerror="this.style.display='none'">
                </span>
            `;
        }

        function renderResearchTaskRows(tasks) {
            if (!tasks.length) return '';
            return `
                <div class="research-task-list">
                    ${tasks.map(item => `
                        <div class="research-task-row">
                            <div class="research-task-image">
                                <img src="${escapeHtml(portraitSmallPath(item.record))}" alt="${escapeHtml(item.record.title)}" loading="lazy" onerror="this.style.display='none'">
                            </div>
                            <div>
                                <div class="research-task-pet">${escapeHtml(item.record.title)}</div>
                                <div class="research-task-text">${escapeHtml(item.taskName)}</div>
                            </div>
                        </div>
                    `).join('')}
                </div>
            `;
        }

        function renderAcquisition(skill) {
            const grouped = new Map();
            skill.variants.forEach(({ record, skill: variant }) => {
                const key = [variant.source || '其他', variant.unlock || variant.level || '暂无条件'].join('|');
                if (!grouped.has(key)) {
                    grouped.set(key, {
                        source: variant.source || '其他',
                        unlock: variant.unlock || variant.level || '暂无条件',
                        pets: []
                    });
                }
                grouped.get(key).pets.push(record);
            });

            const learnRows = [...grouped.values()].sort((a, b) => {
                const sourceCompare = a.source.localeCompare(b.source, 'zh-CN');
                return sourceCompare || a.unlock.localeCompare(b.unlock, 'zh-CN', { numeric: true });
            }).slice(0, 16).map((item, index) => {
                const petRecords = uniqueRecords(item.pets);
                const stripId = `acquire-pets-${safeFileName(skill.name)}-${index}`;
                return `
                    <div class="acquire-item">
                        <div class="acquire-title-row">
                            <div class="acquire-title">${escapeHtml(item.source)}：${escapeHtml(item.unlock)}</div>
                            ${petRecords.length > 1 ? `<button class="acquire-toggle" type="button" aria-label="展开精灵列表" aria-expanded="false" data-acquire-target="${escapeHtml(stripId)}">⌄</button>` : ''}
                        </div>
                        <div class="acquire-pet-strip ${petRecords.length > 1 ? 'is-collapsed' : ''}" id="${escapeHtml(stripId)}">
                            ${petRecords.map(renderPetAvatar).join('')}
                        </div>
                    </div>
                `;
            });

            const visibleTaskRows = skill.researchTasks.slice(0, 36);

            const hiddenLearnCount = grouped.size > 16 ? grouped.size - 16 : 0;
            const hiddenTaskCount = skill.researchTasks.length > 36 ? skill.researchTasks.length - 36 : 0;

            if (!learnRows.length && !visibleTaskRows.length) {
                return '<div class="empty-state">暂无明确获取方式。</div>';
            }

            return `
                <div class="acquire-list">
                    ${learnRows.join('')}
                    ${hiddenLearnCount ? `<div class="acquire-item"><div class="acquire-title">更多学习来源</div><div class="acquire-text">另有 ${hiddenLearnCount} 组来源未展开。</div></div>` : ''}
                    ${visibleTaskRows.length ? `
                        <div class="acquire-item">
                            <div class="acquire-title">图鉴课题线索</div>
                            <div class="acquire-text">下列精灵课题中出现了该技能名称。</div>
                            ${renderResearchTaskRows(visibleTaskRows)}
                            ${hiddenTaskCount ? `<div class="acquire-text">另有 ${hiddenTaskCount} 条课题未展开。</div>` : ''}
                        </div>
                    ` : ''}
                </div>
            `;
        }

        function bindAcquisitionToggles() {
            detailPanel.querySelectorAll('.acquire-toggle').forEach(button => {
                const target = document.getElementById(button.dataset.acquireTarget || '');
                if (!target || target.scrollHeight <= target.clientHeight + 1) {
                    button.classList.add('is-hidden');
                    if (target) target.classList.remove('is-collapsed');
                    return;
                }
                button.addEventListener('click', () => {
                    const target = document.getElementById(button.dataset.acquireTarget || '');
                    if (!target) return;
                    const isCollapsed = target.classList.toggle('is-collapsed');
                    button.classList.toggle('is-open', !isCollapsed);
                    button.setAttribute('aria-expanded', String(!isCollapsed));
                    button.setAttribute('aria-label', isCollapsed ? '展开精灵列表' : '收起精灵列表');
                });
            });
        }

        function renderUsablePets(skill) {
            if (!skill.users.length) {
                return '<div class="empty-state">暂无可使用精灵。</div>';
            }

            return `
                <div class="pet-grid">
                    ${skill.users.map(user => `
                        <article class="pet-card" style="${recordBackgroundStyle(user.record)}">
                            <div class="pet-image-wrap">
                                <img class="pet-image" src="${escapeHtml(portraitSmallPath(user.record))}" alt="${escapeHtml(user.record.title)}" loading="lazy" onerror="this.style.display='none'">
                            </div>
                            <div>
                                <div class="pet-number">NO.${escapeHtml(user.record.number)}</div>
                                <div class="pet-name">${escapeHtml(user.record.title)}</div>
                                <div class="pet-skill-source">${escapeHtml(sourceLabel(user.primarySkill))}</div>
                            </div>
                        </article>
                    `).join('')}
                </div>
            `;
        }

        function showGallery(updateHash = true, restoreScroll = true) {
            galleryView.classList.add('active');
            detailView.classList.remove('active');
            homeLink.style.display = 'inline-flex';
            backToGallery.style.display = 'none';
            selectedSkillName = '';
            if (updateHash) history.pushState('', document.title, location.pathname + location.search);
            requestAnimationFrame(() => {
                window.scrollTo({
                    top: restoreScroll ? galleryScrollY : 0,
                    behavior: 'auto'
                });
            });
        }

        function showDetail(name, updateHash = true) {
            const skill = skills.find(item => item.name === name);
            if (!skill) return;
            if (galleryView.classList.contains('active')) {
                galleryScrollY = window.scrollY;
            }
            selectedSkillName = name;
            renderDetail();
            galleryView.classList.remove('active');
            detailView.classList.add('active');
            homeLink.style.display = 'none';
            backToGallery.style.display = 'inline-flex';
            if (updateHash) location.hash = `skill=${encodeURIComponent(name)}`;
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function renderDetail() {
            const skill = skills.find(item => item.name === selectedSkillName);
            if (!skill) {
                detailPanel.innerHTML = '<div class="empty-state">请选择一个技能查看详情。</div>';
                return;
            }

            const metaTiles = [
                ['系别', typeName(skill.type)],
                ['分类', displayValue(skill.category)],
                ['耗能', displayValue(skill.cost)],
                ['威力', skill.power && skill.power !== '0' ? skill.power : '暂无']
            ];

            detailPanel.innerHTML = `
                <div class="detail-hero" style="${detailStyle(skill)}">
                    <div class="detail-icon-wrap">
                        <img class="detail-icon" src="${escapeHtml(skillIconPath(skill))}" alt="${escapeHtml(skill.name)}" onerror="this.style.display='none'">
                    </div>
                    <div>
                        <div class="detail-header-row">
                            <div class="detail-number">${escapeHtml(typeName(skill.type))}系技能</div>
                            <div class="detail-number">${skill.users.length} 只精灵可用</div>
                        </div>
                        <h2 class="detail-title">${escapeHtml(skill.name)}</h2>
                        <div class="type-row">${renderAttributeChip(skill.type)}</div>
                        <p class="muted-copy" style="color:rgba(255,255,255,0.92);">${escapeHtml(skill.description || '暂无技能描述。')}</p>
                    </div>
                </div>

                <div class="detail-body">
                    <div class="info-grid">
                        ${metaTiles.map(([label, value]) => `
                            <div class="info-tile">
                                <div class="info-label">${escapeHtml(label)}</div>
                                <div class="info-value">${escapeHtml(value)}</div>
                            </div>
                        `).join('')}
                    </div>

                    <div class="detail-section">
                        <h3 class="detail-section-title">技能介绍</h3>
                        <p class="muted-copy">${escapeHtml(skill.description || '暂无技能描述。')}</p>
                    </div>

                    <div class="detail-section">
                        <h3 class="detail-section-title">如何获得</h3>
                        ${renderAcquisition(skill)}
                    </div>

                    <div class="detail-section">
                        <h3 class="detail-section-title">可使用精灵</h3>
                        ${renderUsablePets(skill)}
                    </div>
                </div>
            `;

            bindAcquisitionToggles();
        }

        function hashSkillName() {
            const hash = decodeURIComponent(location.hash.replace(/^#/, ''));
            if (!hash) return '';
            return hash.startsWith('skill=') ? hash.slice(6) : hash;
        }

        async function loadHandbook() {
            try {
                const response = await fetch('handbook_data.json');
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                const data = await response.json();
                records = data.records || [];
                buildSkillIndex();
                renderTypeFilters();
                applyFilters();

                const name = hashSkillName();
                if (name && skills.some(skill => skill.name === name)) {
                    showDetail(name, false);
                }
            } catch (error) {
                console.error(error);
                resultCount.textContent = '加载失败';
                skillList.innerHTML = '<div class="panel empty-state">请确认 handbook_data.json 存在并可访问。</div>';
            }
        }

        document.querySelectorAll('.mode-tab').forEach(button => {
            button.addEventListener('click', () => {
                activeMode = button.dataset.mode || 'skill';
                applyFilters();
            });
        });

        skillSearchInput.addEventListener('input', applyFilters);
        petSearchInput.addEventListener('input', applyFilters);
        clearSkillSearch.addEventListener('click', () => {
            skillSearchInput.value = '';
            applyFilters();
            skillSearchInput.focus();
        });
        clearPetSearch.addEventListener('click', () => {
            petSearchInput.value = '';
            applyFilters();
            petSearchInput.focus();
        });
        backToGallery.addEventListener('click', () => showGallery(true, true));
        window.addEventListener('hashchange', () => {
            const name = hashSkillName();
            if (name && skills.some(skill => skill.name === name)) {
                showDetail(name, false);
            } else {
                showGallery(false, true);
            }
        });
        window.addEventListener('scroll', () => {
            backToTop.classList.toggle('visible', window.scrollY > 480);
        }, { passive: true });
        backToTop.addEventListener('click', () => window.scrollTo({ top: 0, behavior: 'smooth' }));

        loadHandbook();
    </script>
</body>
</html>
